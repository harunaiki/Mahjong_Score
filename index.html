  // v2.1(8.5.1/8.5.2): イベント列から焼き鳥席・箱下の「飛ばした者」・チップ増減を導出する
  function deriveExtrasFromEvents(game, st) {
    const yakitoriSeats = game.seats.map((_, i) => i).filter((i) => !st.everWon[i]);
    const bustCausedByMap = {};
    let s = engine.initialState(game);
    (game.events || []).forEach((ev) => {
      const before = s.points.slice();
      s = engine.applyEvent(s, game, ev);
      s.points.forEach((p, seat) => {
        const wasNeg = before[seat] < 0;
        const isNeg = p < 0;
        if (!wasNeg && isNeg) {
          if (ev.type === 'WIN') {
            const winnerSeat = ev.winners.length > 0 ? ev.winners[0].seat : null; // 頭ハネ=先頭の和了者
            bustCausedByMap[seat] = { seat, bySeat: winnerSeat != null && winnerSeat !== seat ? winnerSeat : undefined };
          } else {
            bustCausedByMap[seat] = { seat }; // 和了以外(罰符・チョンボ・手動調整等)→飛ばした者なし
          }
        } else if (wasNeg && !isNeg) {
          delete bustCausedByMap[seat]; // 終了時点0以上に回復していれば対象外
        }
      });
    });
    const chipCounts = {};
    (game.events || []).forEach((ev) => {
      if (ev.type === 'CHIP') chipCounts[ev.seat] = (chipCounts[ev.seat] || 0) + ev.delta;
    });
    return { yakitoriSeats, bustCausedBy: Object.values(bustCausedByMap), chipCounts };
  }

  function buildResult(game, finalPoints, extras) {
    let ex = extras;
    if (!ex) {
      if (game.events && game.events.length > 0) {
        ex = deriveExtrasFromEvents(game, engine.deriveState(game));
      } else {
        ex = {}; // 結果のみ記録でextras未指定=焼き鳥判定なし
      }
    }
    const res = domain.settleGame(finalPoints, game.seats.length, game.rules, ex);
    const yakiSet = new Set(ex.yakitoriSeats || []);
    return res.map((r) => {
      const pid = game.seats[r.seat].playerId;
      const betYen = game.rules.bet.enabled ? Math.round(r.totalPt * game.rules.bet.ratePerPt) : 0;
      const chipYen = r.chipYen || 0;
      const hasYen = game.rules.bet.enabled || (game.rules.chip.enabled && chipYen !== 0);
      return {
        seat: r.seat,
        playerId: pid,
        finalPoints: r.points,
        rank: r.rank,
        rawPt: r.rawPt,
        umaPt: r.umaPt,
        okaPt: r.okaPt,
        bonusPt: r.bonusPt || 0,
        totalPt: r.totalPt,
        yen: hasYen ? betYen + chipYen : undefined,
        yakitori: yakiSet.has(r.seat),
      };
    });
  }

  // ---- v2.1(6.2.4 MUST): タップ/長押し判定。移動距離10px基準・setPointerCapture・touch-action:none ----
  function bindLongPress(el, onTap, onLongPress, ms) {
    let timer = null;
    let longFired = false;
    let cancelled = false;
    let startX = 0;
    let startY = 0;
    const THRESHOLD = 10;
    el.style.touchAction = 'none';
    el.style.userSelect = 'none';
    const clearTimer = () => {
      if (timer) clearTimeout(timer);
      timer = null;
    };
    const start = (e) => {
      longFired = false;
      cancelled = false;
      startX = e.clientX;
      startY = e.clientY;
      try {
        el.setPointerCapture(e.pointerId);
      } catch (err) {
        /* noop: 一部環境でsetPointerCapture非対応 */
      }
      timer = setTimeout(() => {
        if (!cancelled) {
          longFired = true;
          onLongPress(e);
        }
      }, ms || 500);
    };
    const move = (e) => {
      if (cancelled) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      if (Math.sqrt(dx * dx + dy * dy) > THRESHOLD) {
        cancelled = true;
        clearTimer();
      }
    };
    const end = (e) => {
      clearTimer();
      if (!longFired && !cancelled) onTap(e);
    };
    const onCancel = () => {
      clearTimer();
      cancelled = true;
    };
    el.addEventListener('pointerdown', start);
    el.addEventListener('pointerup', end);
    el.addEventListener('pointermove', move);
    el.addEventListener('pointercancel', onCancel);
    el.addEventListener('contextmenu', (e) => e.preventDefault());
  }

  // ---- F-29: 点差表示(±タップ) ----
  function openPointDiffOverlay(seat) {
    document.querySelectorAll('.diff-overlay').forEach((el) => el.remove());
    const st = engine.deriveState(S.game);
    const active = engine.activeSeats(st, S.game).filter((s) => s !== seat);
    const seatEl = $app.querySelector('.seat[data-seat="' + seat + '"]');
    if (!seatEl) return;
    const rows = active
      .map((o) => {
        const diff = st.points[seat] - st.points[o];
        return '<div class="row"><span>' + playerName(S.game.seats[o].playerId) + '</span><span class="d ' + (diff >= 0 ? 'pos' : 'neg') + '">' + (diff > 0 ? '+' : '') + fmtPts(diff) + '</span></div>';
      })
      .join('');
    const el = document.createElement('div');
    el.className = 'diff-overlay';
    el.innerHTML = rows;
    seatEl.appendChild(el);
    const closeIt = () => el.remove();
    const timer = setTimeout(closeIt, 5000);
    setTimeout(() => {
      document.addEventListener(
        'pointerdown',
        function handler(e) {
          if (!el.contains(e.target)) {
            closeIt();
            clearTimeout(timer);
          }
          document.removeEventListener('pointerdown', handler);
        },
        { once: true }
      );
    }, 0);
    el.addEventListener('pointerdown', () => {
      closeIt();
      clearTimeout(timer);
    });
  }

  function afterEventCommitted() {
    const st = engine.deriveState(S.game);
    if (!st.finished) {
      render();
      return;
    }
    const bustNow = S.game.rules.bustEnd && st.points.some((p) => p < 0);

      render();
      offerBustEnd(st);
    } else {
      offerGameEndByLastKyoku();

    const names = S.game.seats.filter((_, i) => st.points[i] < 0).map((s) => playerName(s.playerId)).join('・');

    if (st.points[seat] < 1000 && !S.game.rules.riichiUnderZero) {
      toast('持ち点が足りずリーチできません');

      toast(playerName(S.game.seats[seat].playerId) + ' リーチ取消');

      afterEventCommitted();
    } else {
      appendEvent({ type: 'RIICHI', seat });

  // ---- F-30: サイコロ演出+割れ目決定 ----
  function rollDice() {
    const gameScreenEl = document.getElementById('game-screen');
    if (!gameScreenEl || gameScreenEl.querySelector('.dice-overlay')) return;
    const overlay = document.createElement('div');
    overlay.className = 'dice-overlay';
    overlay.innerHTML = '<div class="dice-box"><span class="die rolling" id="die1">1</span><span class="die rolling" id="die2">1</span><span class="dice-sum" id="dice-sum"></span></div>';
    gameScreenEl.appendChild(overlay);
    const die1 = overlay.querySelector('#die1');
    const die2 = overlay.querySelector('#die2');
    const spin = setInterval(() => {
      die1.textContent = 1 + Math.floor(Math.random() * 6);
      die2.textContent = 1 + Math.floor(Math.random() * 6);
    }, 70);
    setTimeout(() => {
      clearInterval(spin);
      const a = 1 + Math.floor(Math.random() * 6);
      const b = 1 + Math.floor(Math.random() * 6);
      die1.textContent = a;
      die2.textContent = b;
      die1.classList.remove('rolling');
      die2.classList.remove('rolling');
      overlay.querySelector('#dice-sum').textContent = a + ' + ' + b + ' = ' + (a + b);
      overlay.addEventListener('click', () => overlay.remove());
      setTimeout(() => {
        overlay.remove();
        if (S.game.rules.wareme) {
          confirmDialog('割れ目の設定', 'この出目(合計' + (a + b) + ')で割れ目を設定しますか?', 'はい', () => setWareme(a + b), false);
        }
      }, 2000);
    }, 800);
  }

  function setWareme(sum) {
    const n = S.game.seats.length;
    // 起家(座席0)から反時計回り(座席index増加方向)に、起家自身を1人目として数える
    const seat = (sum - 1) % n;
    appendEvent({ type: 'WAREME_SET', seat });
    toast(playerName(S.game.seats[seat].playerId) + ' が割れ目席になりました(以後の授受が2倍)');
    render();
  }

  // 6.3.5 清算確認画面: 和了・複数和了・流局・チョンボは、確定前に必ずこの画面を通す
  // =================================================================
  function openSettlementConfirm(ev, opts, rotateDeg) {
    // opts: { onBack: fn, onConfirm: fn }
    const preState = engine.deriveState(S.game);
    const postGame = Object.assign({}, S.game, { events: S.game.events.concat([ev]) });
    const postState = engine.deriveState(postGame);
    const active = engine.activeSeats(preState, S.game);

    const cardsHtml = active
      .map((seat) => {
        const before = preState.points[seat];
        const after = postState.points[seat];
        const delta = after - before;
        const deltaStr = (delta > 0 ? '+' : '') + fmtPts(delta) + ' 点';
        return (
          '<div class="settle-card"><div class="settle-row">' +
          '<span class="settle-name">' + playerName(S.game.seats[seat].playerId) + '</span>' +
          '<span class="settle-delta ' + (delta >= 0 ? 'pos' : 'neg') + '">' + deltaStr + '</span>' +
          '</div><div class="settle-sub">' + fmtPts(before) + ' → ' + fmtPts(after) + '</div></div>'
        );
      })
      .join('');

    const infoHtml = buildSettlementInfoCard(ev, preState, postState, S.game);

    const overlay = openSheet(
      '<div class="sheet-header"><button data-back class="iconbtn">‹</button><h2>清算確認</h2><span class="side"></span></div>' +
      '<div class="sheet-body">' +
      '<div class="section-title">点数変動</div>' +
      cardsHtml +
      infoHtml +
      '<div style="padding:18px 14px 4px;"><button class="btn btn-primary btn-block" data-confirm>確定</button></div>' +
      '</div>',
      { full: true, rotateDeg: rotateDeg || 0 }
    );
    overlay.querySelector('[data-back]').onclick = () => {
      closeOverlay(overlay);
      if (opts.onBack) opts.onBack();
    };
    overlay.querySelector('[data-confirm]').onclick = () => {
      closeOverlay(overlay);
      opts.onConfirm();
    };
  }

  function buildSettlementInfoCard(ev, preState, postState, game) {
    const nm = (s) => playerName(game.seats[s].playerId);
    const blocks = [];
    let title = '';

    if (ev.type === 'WIN') {
      title = '和了情報';
      ev.winners.forEach((w) => {
        const isDealer = preState.dealerIdx === w.seat;
        const methodLine = ev.method === 'ron' ? 'ロン (' + nm(ev.loserSeat) + ')' : 'ツモ';
        const scoreLine = w.directPoints != null ? w.directPoints + '点' : w.han + '翻' + w.fu + '符';
        let payLine = w.directPoints + '点';
        if (w.directPoints == null) {
          const pay = domain.winPayments(w.han, w.fu, isDealer ? 'dealer' : 'child', ev.method);
          if (ev.method === 'ron') payLine = fmtPts(pay.total) + '点';
          else if (pay.allSame) payLine = fmtPts(pay.detail.childEach) + '∀';
          else payLine = fmtPts(pay.detail.childPays) + '-' + fmtPts(pay.detail.dealerPays);
        }
        blocks.push(
          '<div class="settle-info-block"><div class="l1">' + nm(w.seat) + '</div>' +
          '<div class="l2">' + methodLine + '</div>' +
          '<div class="l1">' + scoreLine + '</div>' +
          '<div class="l3">' + payLine + '</div></div>'
        );
      });
      const gameLines = [];
      if (preState.sticks > 0) {
        gameLines.push('供託: ' + preState.sticks + '本 → ' + nm(ev.winners[0].seat) + 'が供託' + preState.sticks + '本を獲得');
      }
      if (preState.honba > 0) {
        gameLines.push(preState.honba + '本場 → +' + game.rules.honbaValue * preState.honba + '点(' + (ev.method === 'ron' ? '放銃者負担' : '支払者で割り勘') + ')');
      }
      const winnerIsDealer = ev.winners.some((w) => w.seat === preState.dealerIdx);
      if (winnerIsDealer && !game.rules.dealerWinRotates) {
        gameLines.push('連荘 → ' + engine.kyokuLabel(postState) + ' ' + postState.honba + '本場へ');
      } else {
        gameLines.push('親流れ → ' + engine.kyokuLabel(postState) + 'へ');
      }
      if (gameLines.length) {
        blocks.push('<div class="settle-info-block">' + gameLines.map((l) => '<div class="settle-info-line">' + l + '</div>').join('') + '</div>');
      }
    } else if (ev.type === 'DRAW') {
      title = '流局情報';
      if (ev.special) {
        blocks.push('<div class="settle-info-block"><div class="settle-info-line">特殊流局(九種九牌・四風連打など) → 罰符なし・本場+1</div></div>');
      } else {
        const tenpaiNames = ev.tenpaiSeats.map(nm).join('・') || 'なし';
        const notenNames = engine
          .activeSeats(preState, game)
          .filter((s) => !ev.tenpaiSeats.includes(s))
          .map(nm)
          .join('・') || 'なし';
        blocks.push(
          '<div class="settle-info-block">' +
          '<div class="settle-info-line">テンパイ: ' + tenpaiNames + '</div>' +
          '<div class="settle-info-line">ノーテン: ' + notenNames + '</div>' +
          '</div>'
        );
      }
      const gameLines = [];
      if (postState.sticks > 0) gameLines.push('供託 ' + postState.sticks + '本 → 次局へ繰越');
      const dealerTenpai = ev.special || ev.tenpaiSeats.includes(preState.dealerIdx);
      if (dealerTenpai) gameLines.push('連荘 → ' + engine.kyokuLabel(postState) + ' ' + postState.honba + '本場へ');
      else gameLines.push('親流れ → ' + engine.kyokuLabel(postState) + ' ' + postState.honba + '本場へ');
      blocks.push('<div class="settle-info-block">' + gameLines.map((l) => '<div class="settle-info-line">' + l + '</div>').join('') + '</div>');
    } else if (ev.type === 'CHOMBO') {
      title = 'チョンボ情報';
      const penaltyLabel = ev.penalty === 'mangan' ? '満貫払い' : ev.penalty === 'fixed' ? '固定点数(' + ev.value + '点)' : '精算時pt減算';
      blocks.push(
        '<div class="settle-info-block">' +
        '<div class="settle-info-line">違反者: ' + nm(ev.seat) + '</div>' +
        '<div class="settle-info-line">罰則方式: ' + penaltyLabel + '</div>' +
        '<div class="settle-info-line">' + engine.kyokuLabel(preState) + ' ' + preState.honba + '本場 を同一条件でやり直します</div>' +
        '</div>'
      );
    }

    if (!blocks.length) return '';
    return '<div class="settle-info-card"><div class="settle-info-title">' + title + '</div>' + blocks.join('') + '</div>';
  }

  function stopGameTimer() {
    if (S.timerHandle) {
      clearInterval(S.timerHandle);
      S.timerHandle = null;
    }
  }
  function startGameTimer() {
    const el = document.getElementById('elapsed-el');
    function tick() {
      if (!S.game || !document.getElementById('elapsed-el')) return;
      const ms = Date.now() - S.game.startedAt;
      const totalSec = Math.floor(ms / 1000);
      const mm = String(Math.floor(totalSec / 60)).padStart(2, '0');
      const ss = String(totalSec % 60).padStart(2, '0');
      const e = document.getElementById('elapsed-el');
      if (e) e.textContent = mm + ':' + ss;
    }
    tick();
    S.timerHandle = setInterval(tick, 1000);
  }

  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        S.wakeLockObj = await navigator.wakeLock.request('screen');
      }
    } catch (e) {
      /* 非対応・拒否は無視 */
    }
  }
  function releaseWakeLock() {
    if (S.wakeLockObj) {
      try {
        S.wakeLockObj.release();
      } catch (e) {}
      S.wakeLockObj = null;
    }

  // ---- 手動点数調整 ----
  function openAdjustModal(seat) {
    let val = 0;
    const overlay = openSheet(
      '<div class="sheet-header"><button data-close class="iconbtn">×</button><h2>' + playerName(S.game.seats[seat].playerId) + ' 点数調整</h2><span></span></div>' +
      '<div class="sheet-body">' +
      '<div class="adjust-display" id="adj-disp">0</div>' +
      '<div class="numpad">' +
      ['7', '8', '9', '4', '5', '6', '1', '2', '3', '00', '0', '⌫']
        .map((k) => '<button data-key="' + k + '">' + k + '</button>')
        .join('') +
      '</div>' +
      '<label class="flabel">理由メモ(任意)</label>' +
      '<div style="padding:0 14px;"><input class="txt" id="adj-memo" placeholder="例: チップ精算"></div>' +
      '<div style="padding:16px 14px;"><button class="btn btn-primary btn-block" data-confirm>確定</button></div>' +
      '</div>'
    );
    let numStr = '';
    let sign = 1;
    function updateDisp() {
      overlay.querySelector('#adj-disp').textContent = (sign < 0 ? '-' : '+') + (numStr || '0');
      overlay.querySelector('#adj-disp').style.color = sign < 0 ? 'var(--minus)' : 'var(--plus)';
    }
    overlay.querySelector('[data-close]').onclick = () => closeOverlay(overlay);
    overlay.querySelectorAll('[data-key]').forEach((b) =>
      b.addEventListener('click', () => {
        const k = b.dataset.key;
        if (k === '⌫') numStr = numStr.slice(0, -1);
        else numStr = (numStr + k).replace(/^0+(?=\d)/, '').slice(0, 6);
        updateDisp();
      })
    );
    overlay.querySelector('#adj-disp').addEventListener('click', () => {
      sign *= -1;
      updateDisp();
    });
    updateDisp();
    overlay.querySelector('[data-confirm]').onclick = () => {
      const delta = sign * (parseInt(numStr, 10) || 0);
      if (delta === 0) {
        closeOverlay(overlay);
        return;
      }
      const memo = overlay.querySelector('#adj-memo').value.trim();
      appendEvent({ type: 'ADJUST', seat, delta, memo: memo || undefined });
      closeOverlay(overlay);
      toast(playerName(S.game.seats[seat].playerId) + ' ' + (delta > 0 ? '+' : '') + delta);
      afterEventCommitted();
    };
  }

  function openWinScoreSheet(seat, method, loserSeat, onCommit, rotateSeat) {
    const isDealer = engine.deriveState(S.game).dealerIdx === seat;
    const role = isDealer ? 'dealer' : 'child';
    const hanList = [1, 2, 3, 4];
    const limitList = [
      { label: '満貫', han: 5 },
      { label: '跳満', han: 6 },
      { label: '倍満', han: 8 },
      { label: '三倍満', han: 11 },
      { label: '役満', han: 13 },
      { label: 'ダブル役満', han: 26 },
      { label: 'トリプル役満', han: 39 },
    ];

    function fmtScore(han, fu) {
      const pay = domain.winPayments(han, fu, role, method);
      if (method === 'ron') return fmtPts(pay.total) + '点';
      if (pay.allSame) return fmtPts(pay.detail.childEach) + '∀';
      return fmtPts(pay.detail.childPays) + '/' + fmtPts(pay.detail.dealerPays);
    }

    const hanRowsHtml = hanList
      .map((han) => {
        const fus = domain.validFuOptions(han);
        const body = fus.map((fu) => '<div class="score-row" data-han="' + han + '" data-fu="' + fu + '"><span class="fu">' + fu + '符</span><span class="pts">' + fmtScore(han, fu) + '</span></div>').join('');
        return (
          '<div class="accordion-item">' +
          '<div class="accordion-head" data-toggle="h' + han + '"><span style="font-weight:700;">' + han + '翻</span><span class="chev">›</span></div>' +
          '<div class="accordion-body" id="h' + han + '" style="display:none;">' + body + '</div>' +
          '</div>'
        );
      })
      .join('');
    const limitRowsHtml = limitList
      .map((l) => '<div class="direct-row" data-limit="' + l.han + '"><span>' + l.label + '</span><span class="pts">' + fmtScore(l.han, 30) + '</span></div>')
      .join('');
    const directRowHtml =
      '<div class="direct-row" data-direct><span>直接点数入力</span><span class="chev">›</span></div>';

    const badge = method === 'tsumo' ? '<span class="badge tsumo">ツモ</span>' : '<span class="badge ron">ロン</span>';
    const overlay = openSheet(
      '<div class="sheet-header"><button data-close class="iconbtn">×</button><h2>和了入力</h2><span></span></div>' +
      '<div class="sheet-body">' +
      '<div class="win-summary"><div class="win-summary-head"><div style="font-weight:700;">' + playerName(S.game.seats[seat].playerId) + ' ' + badge + (loserSeat != null ? ' ← ' + playerName(S.game.seats[loserSeat].playerId) : '') + '</div></div></div>' +
      '<div class="section-title">点数</div>' +
      '<div class="card">' + hanRowsHtml + limitRowsHtml + directRowHtml + '</div>' +
      '</div>',
      { full: true, rotateDeg: rotateSeat != null ? rotationDegForSeat(S.game, rotateSeat) : 0 }
    );
    overlay.querySelector('[data-close]').onclick = () => closeOverlay(overlay);
    overlay.querySelectorAll('[data-toggle]').forEach((h) =>
      h.addEventListener('click', () => {
        const body = overlay.querySelector('#' + h.dataset.toggle);
        body.style.display = body.style.display === 'none' ? 'block' : 'none';
      })
    );
    overlay.querySelectorAll('.score-row[data-han]').forEach((row) =>
      row.addEventListener('click', () => {
        const han = +row.dataset.han,
          fu = +row.dataset.fu;
        closeOverlay(overlay);
        onCommit({ seat, han, fu });
      })
    );
    overlay.querySelectorAll('[data-limit]').forEach((row) =>
      row.addEventListener('click', () => {
        const han = +row.dataset.limit;
        closeOverlay(overlay);
        onCommit({ seat, han, fu: 30 });
      })
    );
    overlay.querySelector('[data-direct]').onclick = () => {
      closeOverlay(overlay);
      openDirectPointsInput(seat, method, role, onCommit);
    };
  }

  function commitWin(winners, method, loserSeat, reopenFn, rotateSeat) {
    const ev = { type: 'WIN', winners, method, loserSeat: loserSeat != null ? loserSeat : undefined };
    stampEvent(ev);
    openSettlementConfirm(ev, {
      onBack: reopenFn,
      onConfirm: () => {
        const preState = engine.deriveState(S.game); // 確定前(親判定用)
        commitStampedEvent(ev);
        toast('和了を確定しました');
        speakWinEvent(ev, preState);
        afterEventCommitted();
      },
    }, rotateSeat != null ? rotationDegForSeat(S.game, rotateSeat) : 0);
  }

  // ---- v2.1(6.16): 和了確定の読み上げ ----
  function speakWinEvent(ev, preState) {
    if (!appSettings().voiceEnabled || currentRoute() !== '#/game') return;
    ev.winners.forEach((w) => {
      const isDealer = w.seat === preState.dealerIdx;
      let payDetail = null;
      if (w.directPoints == null) {
        payDetail = domain.winPayments(w.han, w.fu, isDealer ? 'dealer' : 'child', ev.method);
      }
      voice.speakWin({ type: 'WIN', winners: [w], method: ev.method }, payDetail, isDealer);
    });
  }

  function openDrawModal() {
    const st = engine.deriveState(S.game);
    const active = engine.activeSeats(st, S.game);
    // v1.4(6.4): リーチ宣言者は自動的にテンパイ扱い・変更不可
    const tenpai = new Set(active.filter((s) => st.riichi[s]));
    function rowsHtml() {
      return active
        .map((s) => {
          const on = tenpai.has(s);
          const locked = st.riichi[s];
          if (locked) {
            return (
              '<div class="list-row"><div class="label">' + playerName(S.game.seats[s].playerId) + '</div>' +
              '<div class="value" style="color:var(--gold);font-weight:700;">🀄 テンパイ(リーチ)</div></div>'
            );

  function pickDabururonWinners(loserSeat, candidates) {
    const chosen = new Set();
    function html() {
      return candidates
        .map((s) => '<button class="chip ' + (chosen.has(s) ? 'selected' : '') + '" data-s="' + s + '">' + playerName(S.game.seats[s].playerId) + '</button>')
        .join('');
    }
    const overlay = openSheet(
      '<div class="sheet-header"><span></span><h2>和了者を選択(複数可)</h2><button data-close class="iconbtn">×</button></div>' +
      '<div class="chips" id="dab-chips">' + html() + '</div>' +
      '<div style="padding:14px;"><button class="btn btn-primary btn-block" data-next>次へ</button></div>',
      { center: false }
    );
    overlay.querySelector('[data-close]').onclick = () => closeOverlay(overlay);
    function wire() {
      overlay.querySelectorAll('[data-s]').forEach((b) =>
        b.addEventListener('click', () => {
          const s = +b.dataset.s;
          if (chosen.has(s)) chosen.delete(s);
          else chosen.add(s);
          overlay.querySelector('#dab-chips').innerHTML = html();
          wire();
        })
      );
    }
    wire();
    overlay.querySelector('[data-next]').onclick = () => {
      if (chosen.size < 2) {
        toast('2名以上選択してください');
        return;
      }
      closeOverlay(overlay);
      // 頭ハネ順(放銃者から反時計回り=座席index昇順、放銃者より後ろ→前の順)に並べる
      const n = S.game.seats.length;
      const ordered = Array.from(chosen).sort((a, b) => {
        const da = (a - loserSeat + n) % n;
        const db = (b - loserSeat + n) % n;
        return da - db;
      });
      collectDabururonScores(loserSeat, ordered, []);
    };
  }

  function collectDabururonScores(loserSeat, remaining, collected, fullOrdered) {
    fullOrdered = fullOrdered || remaining;
    if (remaining.length === 0) {
      commitWin(collected, 'ron', loserSeat, () => collectDabururonScores(loserSeat, fullOrdered, [], fullOrdered));
      return;
    }
    const seat = remaining[0];
    openWinScoreSheet(seat, 'ron', loserSeat, (winner) => {
      collectDabururonScores(loserSeat, remaining.slice(1), collected.concat([winner]), fullOrdered);
    });
  }

  function openChipModal(seat) {
    let val = 0;
    const overlay = openSheet(
      '<div class="sheet-header"><button data-close class="iconbtn">×</button><h2>' + playerName(S.game.seats[seat].playerId) + ' チップ増減</h2><span></span></div>' +
      '<div class="sheet-body">' +
      '<div class="adjust-display" id="chip-disp">0</div>' +
      '<div class="numpad">' +
      ['7', '8', '9', '4', '5', '6', '1', '2', '3', '', '0', '⌫']
        .map((k) => (k ? '<button data-key="' + k + '">' + k + '</button>' : '<span></span>'))
        .join('') +
      '</div>' +
      '<div class="hint">枚数(タップで±切替)。1枚=' + (S.game.rules.chip.valuePerChip || 0) + '円換算</div>' +
      '<div style="padding:16px 14px;"><button class="btn btn-primary btn-block" data-confirm>確定</button></div>' +
      '</div>'
    );
    let numStr = '';
    let sign = 1;
    function updateDisp() {
      overlay.querySelector('#chip-disp').textContent = (sign < 0 ? '-' : '+') + (numStr || '0') + '枚';
      overlay.querySelector('#chip-disp').style.color = sign < 0 ? 'var(--minus)' : 'var(--plus)';
    }
    overlay.querySelector('[data-close]').onclick = () => closeOverlay(overlay);
    overlay.querySelectorAll('[data-key]').forEach((b) =>
      b.addEventListener('click', () => {
        const k = b.dataset.key;
        if (k === '⌫') numStr = numStr.slice(0, -1);
        else numStr = (numStr + k).replace(/^0+(?=\d)/, '').slice(0, 4);
        updateDisp();
      })
    );
    overlay.querySelector('#chip-disp').addEventListener('click', () => {
      sign *= -1;
      updateDisp();
    });
    updateDisp();
    overlay.querySelector('[data-confirm]').onclick = () => {
      const delta = sign * (parseInt(numStr, 10) || 0);
      if (delta === 0) {
        closeOverlay(overlay);
        return;
      }
      appendEvent({ type: 'CHIP', seat, delta });
      closeOverlay(overlay);
      toast(playerName(S.game.seats[seat].playerId) + ' チップ ' + (delta > 0 ? '+' : '') + delta);
      render();
    };
  }

  function endGame() {
    const st = engine.deriveState(S.game);
    const finalPoints = S.game.seats.map((_, i) => ({ seat: i, points: st.points[i] }));
    const extras = deriveExtrasFromEvents(S.game, st);
    S.game.endedAt = Date.now();
    S.game.durationMin = Math.round((S.game.endedAt - S.game.startedAt) / 60000);
    S.game.status = 'finished';
    S.game.result = buildResult(S.game, finalPoints, extras);
    S.game.stats = st.stats;
    S.pendingResult = S.game;
    S.game = null;
    storage.setActiveGame(null);
    navigate('#/result');
  }

    const methodLabel = { equal: '均等割り', weighted: '傾斜', topExempt: 'トップ免除' }[game.venue.method] || game.venue.method;
    const rows = (game.venue.settlements || [])
      .map((s) => {

  function detailTabHtml(game) {
    // 点数推移: replay events, sampling points after each kyoku-changing event
    const seatNames = game.seats.map((s) => playerName(s.playerId));
    const n = game.seats.length;
    const series = seatNames.map(() => [game.rules.startPoints]);
    let s = engine.initialState(game);

      s = engine.applyEvent(s, game, ev);
      if (ev.type === 'WIN' || ev.type === 'DRAW' || ev.type === 'CHOMBO') {

      }
    });
    const chart = buildLineChartSvg(series, seatNames);
    const gameStats = game.stats || game.seats.map(() => ({ wins: 0, deals: 0, riichis: 0, chombo: 0 }));
    const statHtml = seatNames
      .map(
        (nm, i) =>
          '<div class="stat-row"><div class="nm">' + nm + '</div><div class="col">和' + (gameStats[i] ? gameStats[i].wins : 0) + '</div><div class="col">放' + (gameStats[i] ? gameStats[i].deals : 0) + '</div></div>'
      )
      .join('');
    return (
      '<div class="section-title">点数の推移</div>' +
      '<div class="card" style="padding:10px;">' + chart + '</div>' +
      '<div class="section-title">個人成績</div>' +
      '<div class="card"><div class="stat-head"><div class="nm">プレイヤー</div><div class="col">和了</div><div class="col">放銃</div></div>' + statHtml + '</div>'
    );
  }

  function buildLineChartSvg(series, names) {
    const colors = ['#2e6bd1', '#d64545', '#3d9440', '#e8a13a'];
    const W = 320,
      H = 200,
      pad = 28;
    const allVals = series.flat();
    const min = Math.min(...allVals, 0),
      max = Math.max(...allVals);
    const range = max - min || 1;
    const maxLen = Math.max(...series.map((s) => s.length));
    function x(i) {
      return pad + (i / Math.max(1, maxLen - 1)) * (W - pad * 2);
    }
    function y(v) {
      return H - pad - ((v - min) / range) * (H - pad * 2);
    }
    const lines = series
      .map((s, si) => {
        const d = s.map((v, i) => (i === 0 ? 'M' : 'L') + x(i) + ',' + y(v)).join(' ');
        return '<path d="' + d + '" fill="none" stroke="' + colors[si % colors.length] + '" stroke-width="2.5"/>';
      })
      .join('');
    const legend = names
      .map((nm, i) => '<span style="display:inline-flex;align-items:center;gap:4px;margin-right:12px;font-size:11px;"><span style="width:9px;height:9px;border-radius:50%;background:' + colors[i % colors.length] + ';display:inline-block;"></span>' + nm + '</span>')
      .join('');
    return (
      '<svg class="svgchart" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet">' +
      '<line x1="' + pad + '" y1="' + y(0) + '" x2="' + (W - pad) + '" y2="' + y(0) + '" stroke="#ddd" stroke-dasharray="3,3"/>' +
      lines +
      '</svg><div style="text-align:center;">' + legend + '</div>'
    );
  }

  function defaultVenueWeights(seatCount) {
    return seatCount === 3 ? [10, 30, 60] : [10, 20, 30, 40];
  }
  function persistGameChange(game, isPending) {
    if (isPending) {
      render();
      return;
    }
    backfillSeatNames(game);
    storage.saveGame(game);
    sync.queueGameSave(game);

  function openVenueModal(game, isPending) {
    const ranked = [...game.result].sort((a, b) => a.rank - b.rank);
    const seatsByRank = ranked.map((r) => r.seat);
    const betYenBySeat = {};
    game.result.forEach((r) => {
      betYenBySeat[r.seat] = r.yen || 0;
    });
    const n = seatsByRank.length;
    const v = game.venue;
    const state = {
      totalYen: v ? v.totalYen : 0,
      method: v ? v.method : 'equal',
      weights: v && v.weights ? v.weights.slice() : defaultVenueWeights(n),
      payerSeat: v && v.payerSeat != null ? v.payerSeat : -1,
    };

    function nameOfRankIdx(i) {
      const seat = seatsByRank[i];
      return playerName(game.seats[seat].playerId);
    }

    function computeHtml() {
      const weightsOk = state.method !== 'weighted' || state.weights.reduce((a, b) => a + (b || 0), 0) === 100;
      let settlements = [];
      if (weightsOk && state.totalYen >= 0) {
        settlements = domain.venueSettlement(state.totalYen, state.method, state.weights, seatsByRank, betYenBySeat);
      }
      const rows = seatsByRank
        .map((seat, i) => {
          const s = settlements[i] || { betYen: betYenBySeat[seat] || 0, burdenYen: 0, finalYen: betYenBySeat[seat] || 0 };
          return (
            '<div class="venue-row"><div><div class="nm">' + (i + 1) + '位 ' + nameOfRankIdx(i) + '</div>' +
            '<div class="sub">賭け ' + (s.betYen >= 0 ? '+' : '') + s.betYen.toLocaleString() + '円 ・ 場代負担 -' + s.burdenYen.toLocaleString() + '円</div></div>' +
            '<div class="final ' + (s.finalYen >= 0 ? 'pos' : 'neg') + '">' + (s.finalYen >= 0 ? '+' : '') + s.finalYen.toLocaleString() + '円</div></div>'
          );
        })
        .join('');
      const sumBurden = settlements.reduce((a, s) => a + s.burdenYen, 0);
      const sumFinal = settlements.reduce((a, s) => a + s.finalYen, 0);
      const checkHtml = !weightsOk
        ? '<div class="venue-check-row err">傾斜%の合計が100ではありません(現在' + state.weights.reduce((a, b) => a + (b || 0), 0) + '%)</div>'
        : '<div class="venue-check-row ok">場代合計 ' + sumBurden.toLocaleString() + '円 / 収支合計 ' + (sumFinal >= 0 ? '+' : '') + sumFinal.toLocaleString() + '円 ✓</div>';
      let transferHtml = '';
      if (weightsOk && state.payerSeat >= 0) {
        const transfers = domain.venueTransfers(settlements, state.payerSeat);
        transferHtml =
          '<div class="section-title">送金リスト</div><div class="card">' +
          (transfers.length
            ? transfers.map((t) => '<div class="venue-transfer"><span>' + playerName(game.seats[t.from].playerId) + ' → ' + playerName(game.seats[t.to].playerId) + '</span><span>' + t.amount.toLocaleString() + '円</span></div>').join('')
            : '<div class="list-row"><div class="label" style="color:var(--sub);">送金は発生しません</div></div>') +
          '</div>';
      }
      return { rowsHtml: rows, checkHtml, transferHtml, weightsOk };
    }

    function weightsInputHtml() {
      if (state.method !== 'weighted') return '';
      return (
        '<div class="venue-weights">' +
        seatsByRank
          .map((seat, i) => '<div class="wcell"><label>' + (i + 1) + '位%</label><input type="number" data-w="' + i + '" value="' + (state.weights[i] || 0) + '"></div>')
          .join('') +
        '</div>'
      );
    }

    function payerOptionsHtml() {
      return (
        '<option value="-1"' + (state.payerSeat === -1 ? ' selected' : '') + '>なし(各自払い)</option>' +
        seatsByRank.map((seat, i) => '<option value="' + seat + '"' + (state.payerSeat === seat ? ' selected' : '') + '>' + nameOfRankIdx(i) + '</option>').join('')
      );
    }

    const overlay = openSheet(
      '<div class="sheet-header"><button data-close class="iconbtn">×</button><h2>場代精算</h2><span></span></div>' +
      '<label class="flabel">場代総額(円)</label>' +
      '<div class="stepper-row"><button class="stepper-btn" data-step="-100">−</button><input class="txt" id="venue-total" type="number" step="100" value="' + state.totalYen + '"><button class="stepper-btn" data-step="100">+</button></div>' +
      '<label class="flabel">負担方式</label>' +
      '<div class="seg" style="margin:0 14px 6px;width:auto;" id="venue-method-seg">' +
      ['equal', 'weighted', 'topExempt']
        .map((m) => '<button class="' + (state.method === m ? 'active' : '') + '" data-method="' + m + '">' + (m === 'equal' ? '均等割り' : m === 'weighted' ? '傾斜' : 'トップ免除') + '</button>')
        .join('') +
      '</div>' +
      '<div id="venue-weights-wrap">' + weightsInputHtml() + '</div>' +
      '<label class="flabel">立替者</label>' +
      '<div style="padding:0 14px;"><select class="txt" id="venue-payer">' + payerOptionsHtml() + '</select></div>' +
      '<div id="venue-check" style="margin-top:8px;"></div>' +
      '<div class="card" id="venue-rows" style="margin-top:6px;"></div>' +
      '<div id="venue-transfers"></div>' +
      '<div style="padding:16px 14px 10px;display:flex;gap:10px;">' +
      (game.venue ? '<button class="btn btn-danger-text" data-delete>削除</button>' : '') +
      '<button class="btn btn-primary btn-block" data-save>保存</button>' +
      '</div>',
      { full: true }
    );

    function refresh() {
      const c = computeHtml();
      overlay.querySelector('#venue-rows').innerHTML = c.rowsHtml;
      overlay.querySelector('#venue-check').innerHTML = c.checkHtml;
      overlay.querySelector('#venue-transfers').innerHTML = c.transferHtml;
      overlay.querySelector('[data-save]').disabled = !c.weightsOk;
      overlay.querySelector('[data-save]').style.opacity = c.weightsOk ? '1' : '.4';
    }

    overlay.querySelector('[data-close]').onclick = () => closeOverlay(overlay);
    const totalInput = overlay.querySelector('#venue-total');
    totalInput.oninput = () => {
      state.totalYen = Math.max(0, parseInt(totalInput.value, 10) || 0);
      refresh();
    };
    overlay.querySelectorAll('[data-step]').forEach((b) =>
      b.addEventListener('click', () => {
        state.totalYen = Math.max(0, state.totalYen + parseInt(b.dataset.step, 10));
        totalInput.value = state.totalYen;
        refresh();
      })
    );
    overlay.querySelectorAll('[data-method]').forEach((b) =>
      b.addEventListener('click', () => {
        state.method = b.dataset.method;
        overlay.querySelectorAll('[data-method]').forEach((x) => x.classList.toggle('active', x === b));
        overlay.querySelector('#venue-weights-wrap').innerHTML = weightsInputHtml();
        bindWeightInputs();
        refresh();
      })
    );
    function bindWeightInputs() {
      overlay.querySelectorAll('[data-w]').forEach((inp) =>
        inp.addEventListener('input', () => {
          state.weights[parseInt(inp.dataset.w, 10)] = parseFloat(inp.value) || 0;
          refresh();
        })
      );
    }
    bindWeightInputs();
    overlay.querySelector('#venue-payer').onchange = (e) => {
      state.payerSeat = parseInt(e.target.value, 10);
      refresh();
    };
    overlay.querySelector('[data-save]').onclick = () => {
      const c = computeHtml();
      if (!c.weightsOk) return;
      const settlements = domain.venueSettlement(state.totalYen, state.method, state.weights, seatsByRank, betYenBySeat);
      game.venue = {
        totalYen: state.totalYen,
        method: state.method,
        weights: state.method === 'weighted' ? state.weights.slice() : undefined,
        payerSeat: state.payerSeat >= 0 ? state.payerSeat : undefined,
        settlements,
        updatedAt: Date.now(),
      };
      game.updatedAt = Date.now();
      closeOverlay(overlay);
      persistGameChange(game, isPending);
      toast('場代精算を保存しました');
    };
    const deleteBtn = overlay.querySelector('[data-delete]');
    if (deleteBtn) {
      deleteBtn.onclick = () => {
        delete game.venue;
        game.updatedAt = Date.now();
        closeOverlay(overlay);
        persistGameChange(game, isPending);
        toast('場代精算を削除しました');
      };
    }
    refresh();
  }

  function screenPlayersStatsInner() {
    const games = storage.getGames().filter((g) => g.status === 'finished' && !g.deleted);
    const agg = {};
    S.players.forEach((p) => {
      agg[p.id] = { id: p.id, name: p.name, count: 0, totalPt: 0, totalYen: 0, rankSum: 0 };
    });
    games.forEach((g) => {
      (g.result || []).forEach((r) => {
        if (!agg[r.playerId]) agg[r.playerId] = { id: r.playerId, name: playerName(r.playerId), count: 0, totalPt: 0, totalYen: 0, rankSum: 0 };
        agg[r.playerId].count++;
        agg[r.playerId].totalPt += r.totalPt;
        agg[r.playerId].totalYen += r.yen || 0;
        agg[r.playerId].rankSum += r.rank;
      });
    });
    const rows = Object.values(agg)
      .filter((a) => a.count > 0)

      .map(
        (a) =>
          '<div class="stat-row tap" data-player="' + a.id + '"><div class="nm">' + a.name + '<div style="font-size:11px;color:var(--sub);">' + a.count + '戦</div></div>' +

      )
      .join('');

  const STATS_PERIODS = [
    ['all', '全期間'],
    ['month', '今月'],
    ['30d', '直近30日'],
  ];
  function periodRange(period) {
    if (period === 'month') {
      const now = new Date();
      const from = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
      return { from };
    }
    if (period === '30d') {
      return { from: Date.now() - 30 * 24 * 3600 * 1000 };
    }
    return {};
  }
  function rankBarHtml(rankCounts, maxSeats, count) {
    if (!count || !maxSeats) return '<div class="hint">対局がありません</div>';
    const colors = ['#e8c04c', '#b9bcc4', '#c98a4b', '#8a8a8e'];
    let segs = '';
    for (let rk = 1; rk <= maxSeats; rk++) {
      const c = rankCounts[rk] || 0;
      const pct = (c / count) * 100;
      if (pct <= 0) continue;
      segs += '<div class="seg" style="width:' + pct + '%;background:' + colors[rk - 1] + ';">' + (pct >= 10 ? rk + '位 ' + pct.toFixed(0) + '%' : '') + '</div>';
    }
    const tableRows = [];
    for (let rk = 1; rk <= maxSeats; rk++) {
      const c = rankCounts[rk] || 0;
      tableRows.push('<div class="list-row"><div class="label">' + rk + '位</div><div class="value">' + c + '回 (' + ((c / count) * 100).toFixed(1) + '%)</div></div>');
    }
    return '<div class="rankbar">' + segs + '</div><div class="card">' + tableRows.join('') + '</div>';
  }

  // ---- v2.1(6.8/7.6): 定番候補チップ+カスタム欄の2段構成選択シート ----
  function chipCustomDialog(label, candidates, currentValue, onSave, opts) {
    opts = opts || {};
    const isArrayType = Array.isArray(currentValue);
    const curStr = isArrayType ? currentValue.join(',') : String(currentValue);
    const matchIdx = candidates.findIndex((c) => (Array.isArray(c.value) ? c.value.join(',') : String(c.value)) === curStr);
    const chipsHtml = candidates
      .map((c, i) => {
        const val = Array.isArray(c.value) ? c.value.join(',') : c.value;
        return '<button class="chip ' + (i === matchIdx ? 'selected' : '') + '" data-chip-v="' + val + '">' + c.label + '</button>';
      })
      .join('');
    const overlay = openSheet(
      '<div class="sheet-header"><span></span><h2>' + label + '</h2><button data-close class="iconbtn">×</button></div>' +
      '<div class="chips">' + chipsHtml + '</div>' +
      '<label class="flabel">カスタム' + (opts.unit ? '(' + opts.unit + ')' : '') + '</label>' +
      '<div style="padding:0 14px;"><input class="txt" id="cc-custom" value="' + (matchIdx >= 0 ? '' : curStr) + '" placeholder="' + (isArrayType ? 'カンマ区切り 例: 10,5,-5,-10' : '数値') + '"></div>' +
      '<div style="padding:16px 14px;"><button class="btn btn-primary btn-block" data-save>保存</button></div>'
    );
    overlay.querySelector('[data-close]').onclick = () => closeOverlay(overlay);
    overlay.querySelectorAll('[data-chip-v]').forEach((b) =>
      b.addEventListener('click', () => {
        const raw = b.dataset.chipV;
        const val = isArrayType ? raw.split(',').map(Number) : parseFloat(raw);
        closeOverlay(overlay);
        onSave(val);
      })
    );
    overlay.querySelector('[data-save]').onclick = () => {
      const raw = overlay.querySelector('#cc-custom').value.trim();
      if (!raw) return;
      const val = isArrayType ? raw.split(',').map((x) => parseFloat(x.trim())).filter((x) => !isNaN(x)) : parseFloat(raw);
      if (isArrayType ? val.length === 0 : isNaN(val)) return;
      closeOverlay(overlay);
      onSave(val);
    };
  }

  // ---- v2.0: JSON/QR/URLインポート共通のマージロジック(10章・6.12.5) ----
  // ID一致で既存とみなし、updatedAtが新しければ上書き。プレイヤーは名前一致で紐付け。
  function mergeGamesAndPlayers(gamesIn, playersIn, sessionsIn) {
    const existing = storage.getGames();
    const idxById = {};
    existing.forEach((g, i) => (idxById[g.id] = i));
    let added = 0, updated = 0;
    const touched = [];
    (gamesIn || []).forEach((g) => {
      const idx = idxById[g.id];
      if (idx == null) {
        existing.push(g);
        idxById[g.id] = existing.length - 1;
        added++;
        touched.push(g);
      } else if ((existing[idx].updatedAt || 0) < (g.updatedAt || 0)) {
        existing[idx] = g;
        updated++;
        touched.push(g);
      }
    });
    storage.setGames(existing);
    const existingPlayers = storage.getPlayers();
    const byName = new Map(existingPlayers.map((p) => [p.name, p]));
    let playersAdded = 0;
    (playersIn || []).forEach((p) => {
      if (!byName.has(p.name)) {
        existingPlayers.push(p);
        playersAdded++;
      }
    });
    storage.setPlayers(existingPlayers);
    S.players = existingPlayers;
    // v2.1(6.15.5): 会も同一ロジックでマージ(ID一致・updatedAtが新しければ上書き)
    let sessionsTouched = 0;
    if (sessionsIn && sessionsIn.length) {
      const existingSessions = storage.getSessions();
      const sIdx = {};
      existingSessions.forEach((s, i) => (sIdx[s.id] = i));
      sessionsIn.forEach((s) => {
        const idx = sIdx[s.id];
        if (idx == null) {
          existingSessions.push(s);
          sIdx[s.id] = existingSessions.length - 1;
          sessionsTouched++;
        } else if ((existingSessions[idx].updatedAt || 0) < (s.updatedAt || 0)) {
          existingSessions[idx] = s;
          sessionsTouched++;
        }
      });
      storage.setSessions(existingSessions);
      if (sessionsTouched && sync.isConfigured()) sync.queueSessionSave(sessionsIn);
    }
    // v2.0(6.12.5): 受信データも通常の同期キューへ積む(同期設定済み端末ならシートにも反映)
    if (touched.length && sync.isConfigured()) {
      sync.queueGameSave(touched);
      sync.flushQueue();
    }
    return { added, updated, playersAdded, sessionsTouched };
  }

  function importJsonFlow() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = () => {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          const r = mergeGamesAndPlayers(data.games || [], data.players || [], data.sessions || []);
          const logs = storage.getShareLogs();
          logs.push({ id: engine.uid(), direction: 'import', method: 'json', at: Date.now(), gameIds: (data.games || []).map((g) => g.id) });
          storage.setShareLogs(logs);
          toast((r.added + r.updated) + '件の対局をインポートしました');
          render();
        } catch (e) {
          toast('インポートに失敗しました: ファイル形式を確認してください');
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }

  // =================================================================
  // v2.0: F-31 結果共有画像(6.11)
  // =================================================================
  function roundRectPath(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }
  function truncateText(ctx, text, maxWidth) {
    if (ctx.measureText(text).width <= maxWidth) return text;
    let t = text;
    while (t.length > 1 && ctx.measureText(t + '…').width > maxWidth) t = t.slice(0, -1);
    return t + '…';
  }
  function buildResultImageCanvas(game) {
    const W = 1080, H = 1350;
    const canvas = document.createElement('canvas');
    canvas.width = W;
    canvas.height = H;
    const ctx = canvas.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#3d9440');
    grad.addColorStop(1, '#1f5322');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    const modeLabel = { yonma: '4人麻雀', sanma: '3人麻雀', yonin_sanma: '4人3麻' }[game.mode] || game.mode;
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,.85)';
    ctx.font = '600 30px sans-serif';
    ctx.fillText('雀点', W / 2, 78);
    ctx.fillStyle = '#fff';
    ctx.font = '800 58px sans-serif';
    ctx.fillText('対局結果', W / 2, 150);
    ctx.font = '600 30px sans-serif';
    ctx.fillText(modeLabel, W / 2, 196);
    ctx.font = '400 25px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,.85)';
    const dateStr = fmtDateTime(game.startedAt) + ' 開始' + (game.durationMin != null ? ' ・ 所要' + game.durationMin + '分' : '') + ' ・ MF' + game.serialNo;
    ctx.fillText(dateStr, W / 2, 236);

    const ranked = [...game.result].sort((a, b) => a.rank - b.rank);
    const cardX = 56, cardY = 280, cardW = W - 112, rowH = 150;
    const cardH = ranked.length * rowH + 30;
    ctx.fillStyle = '#ffffff';
    roundRectPath(ctx, cardX, cardY, cardW, cardH, 26);
    ctx.fill();

    const rankColors = ['#e8c04c', '#b9bcc4', '#c98a4b', '#8a8a8e'];
    ranked.forEach((r, i) => {
      const y = cardY + 20 + i * rowH;
      ctx.fillStyle = rankColors[i] || '#8a8a8e';
      ctx.beginPath();
      ctx.arc(cardX + 76, y + 60, 36, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = '800 34px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(String(r.rank), cardX + 76, y + 73);

      ctx.textAlign = 'left';
      ctx.fillStyle = '#1c1c1e';
      ctx.font = '700 40px sans-serif';
      const nm = truncateText(ctx, playerName(r.playerId) + (r.yakitori ? ' 🐤' : ''), cardW - 340);
      ctx.fillText(nm, cardX + 140, y + 45);

      ctx.font = '400 24px sans-serif';
      ctx.fillStyle = '#8a8a8e';
      ctx.fillText('最終 ' + fmtPts(r.finalPoints) + '点', cardX + 140, y + 80);
      ctx.font = '400 21px sans-serif';
      const breakdown = '素点' + fmtPt(r.rawPt) + ' ウマ' + fmtPt(r.umaPt) + (r.okaPt ? ' オカ' + fmtPt(r.okaPt) : '');
      ctx.fillText(breakdown, cardX + 140, y + 110);

      ctx.textAlign = 'right';
      ctx.font = '800 56px sans-serif';
      ctx.fillStyle = r.totalPt >= 0 ? '#2e6bd1' : '#d64545';
      ctx.fillText(fmtPt(r.totalPt), cardX + cardW - 28, y + 55);

      ctx.font = '500 26px sans-serif';
      if (game.venue) {
        const vs = (game.venue.settlements || []).find((s) => s.seat === r.seat);
        if (vs) {
          ctx.fillStyle = vs.finalYen >= 0 ? '#2e6bd1' : '#d64545';
          ctx.fillText((vs.finalYen >= 0 ? '+' : '') + vs.finalYen.toLocaleString() + '円', cardX + cardW - 28, y + 100);
        }
      } else if (r.yen != null) {
        ctx.fillStyle = '#555';
        ctx.fillText((r.yen >= 0 ? '+' : '') + r.yen.toLocaleString() + '円', cardX + cardW - 28, y + 100);
      }
      ctx.textAlign = 'left';
      if (i < ranked.length - 1) {
        ctx.strokeStyle = '#eee';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cardX + 20, y + rowH - 10);
        ctx.lineTo(cardX + cardW - 20, y + rowH - 10);
        ctx.stroke();
      }
    });

    let footerY = cardY + cardH + 60;
    ctx.textAlign = 'center';
    if (game.venue) {
      const methodLabel = { equal: '均等割り', weighted: '傾斜', topExempt: 'トップ免除' }[game.venue.method] || game.venue.method;
      ctx.fillStyle = '#fff';
      ctx.font = '600 30px sans-serif';
      ctx.fillText('場代 ¥' + game.venue.totalYen.toLocaleString() + '(' + methodLabel + ')', W / 2, footerY);
      footerY += 46;
    }
    ctx.font = '400 22px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,.75)';
    ctx.fillText('Recorded with 雀点', W / 2, H - 58);
    ctx.font = '400 18px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,.55)';
    ctx.fillText(fmtDateTime(Date.now()) + ' 生成', W / 2, H - 30);
    return canvas;
  }

  // =================================================================
  // v2.0: F-32 QR/URLデータ共有(6.12)
  // =================================================================
  function buildImportUrl(encoded) {
    return location.origin + location.pathname + '#import=' + encoded;
  }
  function renderQrSvg(text) {
    if (typeof qrcode === 'undefined') return '';
    const qr = qrcode(0, 'M');
    qr.addData(text);
    qr.make();
    return qr.createSvgTag({ scalable: true });
  }
  async function openDataShareModal(games) {
    const overlay = openSheet(
      '<div class="sheet-header"><button data-close class="iconbtn">×</button><h2>QR/URLで共有</h2><span></span></div>' +
      '<div class="hint" id="ds-status">生成中...</div>',
      { full: true }
    );
    overlay.querySelector('[data-close]').onclick = () => closeOverlay(overlay);
    try {
      const gamesNoDeleted = games.filter((g) => !g.deleted);
      const playerIds = new Set();
      gamesNoDeleted.forEach((g) => g.seats.forEach((s) => playerIds.add(s.playerId)));
      const players = storage.getPlayers().filter((p) => playerIds.has(p.id));
      const sessionIds = new Set(gamesNoDeleted.map((g) => g.sessionId).filter(Boolean));
      const sessions = storage.getSessions().filter((s) => sessionIds.has(s.id));
      const payload = { v: 1, games: gamesNoDeleted, players, sessions: sessions.length ? sessions : undefined };
      const encoded = await share.encodePayload(payload);
      const url = buildImportUrl(encoded);
      const sizeBytes = encoded.length;
      if (url.length > 30000) {
        overlay.querySelector('.sheet').innerHTML =
          '<div class="sheet-header"><button data-close class="iconbtn">×</button><h2>QR/URLで共有</h2><span></span></div>' +
          '<div class="hint" style="color:var(--red);padding:20px;">URLが30,000文字を超えるため生成できません。件数を減らすか、JSONファイル送信をご利用ください。</div>';
        overlay.querySelector('[data-close]').onclick = () => closeOverlay(overlay);
        return;
      }
      const qrHtml = sizeBytes <= 2000
        ? '<div class="qr-wrap">' + renderQrSvg(url) + '</div>'
        : '<div class="hint" style="padding:14px;">データが大きいためQRは表示できません。リンクコピーをご利用ください。</div>';
      const summaryTxt = '対局' + gamesNoDeleted.length + '件・プレイヤー' + players.length + '名(約' + (sizeBytes / 1024).toFixed(1) + 'KB)';
      overlay.querySelector('.sheet').innerHTML =
        '<div class="sheet-header"><button data-close class="iconbtn">×</button><h2>QR/URLで共有</h2><span></span></div>' +
        '<div class="hint" style="text-align:center;">' + summaryTxt + '</div>' +
        qrHtml +
        '<div class="share-url-box" id="ds-url">' + url + '</div>' +
        '<div class="hint" style="text-align:center;">相手がこのリンクを開くと、このアプリに対局データが取り込まれます</div>' +
        '<div style="padding:16px 14px;"><button class="btn btn-primary btn-block" data-copy>リンクをコピー</button></div>';
      overlay.querySelector('[data-close]').onclick = () => closeOverlay(overlay);
      overlay.querySelector('[data-copy]').onclick = () => {
        if (navigator.clipboard) {
          navigator.clipboard.writeText(url).then(() => toast('コピーしました')).catch(() => toast('コピーできませんでした'));
        } else {
          toast('コピーできませんでした。手動で選択してください');
        }
        logShare('export', 'url', gamesNoDeleted.map((g) => g.id));
      };
    } catch (e) {
      overlay.querySelector('#ds-status').textContent = 'このブラウザではQR/URL共有を生成できません: ' + (e && e.message ? e.message : e);
    }
  }

  function openImportConfirm(payload) {

      toast((r.added + r.updated) + '件の対局を取り込みました');

  async function consumeImportLink() {
    const h = location.hash;
    if (h.indexOf('#import=') !== 0) return;
    const encoded = h.slice('#import='.length);
    history.replaceState(null, '', location.pathname + location.search);
    try {
      const payload = await share.decodePayload(encoded);
      if (!payload || !Array.isArray(payload.games)) throw new Error('invalid_schema');
      openImportConfirm(payload);
    } catch (e) {
      toast('共有リンクを読み取れませんでした');
    }

  function openMergeFlow() {
    const players = S.players.filter((p) => !p.archived && !p.deleted);
    const listHtml = players.map((p) => '<div class="list-row"><div class="label">' + p.name + '</div><input type="checkbox" data-mp="' + p.id + '"></div>').join('');
    const overlay = openSheet(
      '<div class="sheet-header"><span></span><h2>プレイヤーのマージ</h2><button data-close class="iconbtn">×</button></div>' +
      '<div class="hint">統合するプレイヤーを2名以上選択してください</div>' +
      '<div class="card" style="margin-top:6px;">' + listHtml + '</div>' +
      '<div style="padding:14px;"><button class="btn btn-primary btn-block" data-next>次へ(統合先を選択)</button></div>',
      { full: true }
    );
    overlay.querySelector('[data-close]').onclick = () => closeOverlay(overlay);
    overlay.querySelector('[data-next]').onclick = () => {
      const checked = Array.from(overlay.querySelectorAll('[data-mp]:checked')).map((c) => c.dataset.mp);
      if (checked.length < 2) {
        toast('2名以上選択してください');
        return;
      }
      closeOverlay(overlay);
      chooseMergeTarget(checked);
    };
  }

  function chooseMergeTarget(ids) {
    const opts = ids.map((id) => [id, playerName(id)]);
    selectDialog('統合先を選択', opts, ids[0], (targetId) => {
      const sourceIds = ids.filter((id) => id !== targetId);
      const targetName = playerName(targetId);
      const games = storage.getGames();
      const touchedGames = [];
      games.forEach((g) => {
        let touched = false;
        g.seats.forEach((s) => {
          if (sourceIds.includes(s.playerId)) {
            s.playerId = targetId;
            s.name = targetName;
            touched = true;
          }
        });
        if (g.result) {
          g.result.forEach((r) => {
            if (sourceIds.includes(r.playerId)) {
              r.playerId = targetId;
              touched = true;
            }
          });
        }
        if (touched) {
          g.updatedAt = Date.now();
          touchedGames.push(g);
        }
      });
      storage.setGames(games);
      const archivedPlayers = [];
      S.players.forEach((p) => {
        if (sourceIds.includes(p.id)) {
          p.archived = true;
          p.updatedAt = Date.now();
          archivedPlayers.push(p);
        }
      });
      storage.setPlayers(S.players);
      if (touchedGames.length) {
        sync.queueGameSave(touchedGames);
      }
      if (archivedPlayers.length) {
        sync.queuePlayersSave(archivedPlayers);
      }
      sync.flushQueue();
      toast(touchedGames.length + '件の対局を統合しました');
      render();
    });
  }

  // ---- v1.4(15.5): 設定共有リンク #setup=<Base64 JSON> の読み取り ----
  function consumeSetupLink() {
    const h = location.hash;
    if (!h.startsWith('#setup=')) return;
    try {
      const b64 = h.slice('#setup='.length);
      const json = decodeURIComponent(escape(atob(b64)));
      const parsed = JSON.parse(json);
      if (parsed.gasUrl) {
        const cfg = storage.getSyncConfig();
        storage.setSyncConfig({ url: parsed.gasUrl, token: parsed.token || '', lastSyncAt: cfg.lastSyncAt || null });
        toast('スプレッドシート連携の設定を取り込みました');
      }
    } catch (e) {
      console.error('setup link parse failed', e);
    }
    history.replaceState(null, '', location.pathname + location.search);
  }

  // ---- v1.4(15.5): localStorageに同期設定が無ければ APP_CONFIG を自動採用 ----
  function applyDefaultSyncConfig() {
    const cfg = storage.getSyncConfig();
    if (!cfg.url && typeof APP_CONFIG !== 'undefined' && APP_CONFIG.gasUrl) {
      storage.setSyncConfig({ url: APP_CONFIG.gasUrl, token: APP_CONFIG.token || '', lastSyncAt: cfg.lastSyncAt || null });
    }
  }

  function buildSetupLink() {
    const cfg = storage.getSyncConfig();
    const json = JSON.stringify({ gasUrl: cfg.url, token: cfg.token });
    const b64 = btoa(unescape(encodeURIComponent(json)));
    return location.origin + location.pathname + '#setup=' + b64;
  }

  // =================================================================
  // INIT
  // =================================================================
  function init() {
    consumeSetupLink();
    applyDefaultSyncConfig();
    render();
    consumeImportLink();
    if (sync.isConfigured()) {
      sync.pullAndMerge().then((res) => {
        if (res && res.ok && (res.merged || res.mergedPlayers)) {
          S.players = storage.getPlayers();
          if (currentRoute() === '#/' || currentRoute().startsWith('#/records')) render();
        }
      });
      sync.flushQueue();
    }
    window.addEventListener('online', () => sync.flushQueue());
  }

  return { init };
})();

      const g1 = {
        id: 'tc8-1', mode: 'yonma', rules: baseRules,
        seats: [{ playerId: 'PA' }, { playerId: 'PB' }, { playerId: 'PC' }, { playerId: 'PD' }],
        events: [
          { type: 'WIN', winners: [{ seat: 0, directPoints: 3900 }], method: 'ron', loserSeat: 1 },
          { type: 'RIICHI', seat: 2 },
          { type: 'RIICHI_CANCEL', seat: 2 },
          { type: 'RIICHI', seat: 2 },
          { type: 'WIN', winners: [{ seat: 2, han: 2, fu: 30 }], method: 'tsumo' },
          { type: 'DRAW', tenpaiSeats: [0] },
        ],
        status: 'finished',
        startedAt: Date.now() - 1000,
        endedAt: Date.now(),
        result: [
          { seat: 0, playerId: 'PA', rank: 1, totalPt: 10, yen: 0 },
          { seat: 1, playerId: 'PB', rank: 2, totalPt: 0, yen: 0 },
          { seat: 2, playerId: 'PC', rank: 3, totalPt: -5, yen: 0 },
          { seat: 3, playerId: 'PD', rank: 4, totalPt: -5, yen: 0 },
        ],
      };
      const styA = stats.styleMetrics([g1], 'PA');
      const styB = stats.styleMetrics([g1], 'PB');
      const styC = stats.styleMetrics([g1], 'PC');
      check('TC-8-1 Aの参加局数3', styA.totalKyoku, 3);
      check('TC-8-1 Aの和了率(1/3)', styA.winRate, 1 / 3);
      check('TC-8-1 Bの放銃率(1/3)', styB.dealRate, 1 / 3);
      check('TC-8-1 Cのリーチ率(CANCEL相殺後1/3)', styC.riichiRate, 1 / 3);

      // TC-8-2: 平均打点に本場・供託を含まない
      const g2 = {
        id: 'tc8-2', mode: 'yonma', rules: baseRules,
        seats: [{ playerId: 'PA' }, { playerId: 'PB' }, { playerId: 'PC' }, { playerId: 'PD' }],
        events: [
          { type: 'DRAW', tenpaiSeats: [0, 1, 2, 3] },
          { type: 'DRAW', tenpaiSeats: [0, 1, 2, 3] },
          { type: 'RIICHI', seat: 2 },
          { type: 'RIICHI', seat: 3 },
          { type: 'WIN', winners: [{ seat: 1, directPoints: 3900 }], method: 'ron', loserSeat: 0 },
        ],
        status: 'finished', startedAt: Date.now() - 1000, endedAt: Date.now(),
        result: [
          { seat: 0, playerId: 'PA', rank: 4, totalPt: -10, yen: 0 },
          { seat: 1, playerId: 'PB', rank: 1, totalPt: 10, yen: 0 },
          { seat: 2, playerId: 'PC', rank: 2, totalPt: 0, yen: 0 },
          { seat: 3, playerId: 'PD', rank: 3, totalPt: 0, yen: 0 },
        ],
      };
      const evStatsB = stats.computeEventStats(g2, 1);
      check('TC-8-2 平均打点に本場供託を含まない(3900)', evStatsB.sumWinPoints, 3900);

      // TC-8-3: ダブロン
      const g3 = {
        id: 'tc8-3', mode: 'yonma', rules: baseRules,
        seats: [{ playerId: 'PA' }, { playerId: 'PB' }, { playerId: 'PC' }, { playerId: 'PD' }],
        events: [{ type: 'WIN', winners: [{ seat: 0, directPoints: 2000 }, { seat: 1, directPoints: 1000 }], method: 'ron', loserSeat: 2 }],
        status: 'finished', startedAt: Date.now() - 1000, endedAt: Date.now(),
        result: [
          { seat: 0, playerId: 'PA', rank: 1, totalPt: 5, yen: 0 },
          { seat: 1, playerId: 'PB', rank: 2, totalPt: 3, yen: 0 },
          { seat: 2, playerId: 'PC', rank: 4, totalPt: -10, yen: 0 },
          { seat: 3, playerId: 'PD', rank: 3, totalPt: 2, yen: 0 },
        ],
      };
      const evA3 = stats.computeEventStats(g3, 0);
      const evB3 = stats.computeEventStats(g3, 1);
      const evC3 = stats.computeEventStats(g3, 2);
      check('TC-8-3 ダブロンAの和了+1', evA3.wins, 1);
      check('TC-8-3 ダブロンBの和了+1', evB3.wins, 1);
      check('TC-8-3 放銃者の放銃は1のみ', evC3.deals, 1);

      // TC-8-4: チョンボ局は参加局数に数えない
      const g4 = {
        id: 'tc8-4', mode: 'yonma', rules: baseRules,
        seats: [{ playerId: 'PA' }, { playerId: 'PB' }, { playerId: 'PC' }, { playerId: 'PD' }],
        events: [{ type: 'CHOMBO', seat: 1, penalty: 'mangan' }],
        status: 'finished', startedAt: Date.now() - 1000, endedAt: Date.now(),
        result: [
          { seat: 0, playerId: 'PA', rank: 1, totalPt: 5, yen: 0 },
          { seat: 1, playerId: 'PB', rank: 4, totalPt: -15, yen: 0 },
          { seat: 2, playerId: 'PC', rank: 2, totalPt: 5, yen: 0 },
          { seat: 3, playerId: 'PD', rank: 3, totalPt: 5, yen: 0 },
        ],
      };
      const evB4 = stats.computeEventStats(g4, 1);
      check('TC-8-4 チョンボ局は参加局数0', evB4.participatedKyoku, 0);
      check('TC-8-4 チョンボ回数1', evB4.chombo, 1);

      // TC-8-5: resultのみ(eventsなし)の対局混在
      const g5 = {
        id: 'tc8-5', mode: 'yonma', rules: baseRules,
        seats: [{ playerId: 'PA' }, { playerId: 'PB' }, { playerId: 'PC' }, { playerId: 'PD' }],
        events: [],
        status: 'finished', startedAt: Date.now() - 1000, endedAt: Date.now(),
        result: [
          { seat: 0, playerId: 'PA', rank: 2, totalPt: 3, yen: 0 },
          { seat: 1, playerId: 'PB', rank: 1, totalPt: 8, yen: 0 },
          { seat: 2, playerId: 'PC', rank: 3, totalPt: -3, yen: 0 },
          { seat: 3, playerId: 'PD', rank: 4, totalPt: -8, yen: 0 },
        ],
      };
      const smA = stats.summary([g1, g5], 'PA');
      const styA15 = stats.styleMetrics([g1, g5], 'PA');
      check('TC-8-5 結果のみ対局も合計ptに反映(2局)', smA.count, 2);
      check('TC-8-5 和了率等の分母には入らない(1局のみ)', styA15.evGameCount, 1);

      // TC-8-6: 直対収支
      const mk = (id, aRank, bRank) => ({
        id, mode: 'yonma', rules: baseRules,
        seats: [{ playerId: 'PA' }, { playerId: 'PB' }, { playerId: 'PC' }, { playerId: 'PD' }],
        events: [], status: 'finished', startedAt: Date.now() - 1000, endedAt: Date.now(),
        result: [
          { seat: 0, playerId: 'PA', rank: aRank, totalPt: aRank === 1 ? 20 : -20, yen: 0 },
          { seat: 1, playerId: 'PB', rank: bRank, totalPt: bRank === 1 ? 20 : -20, yen: 0 },
          { seat: 2, playerId: 'PC', rank: 3, totalPt: 0, yen: 0 },
          { seat: 3, playerId: 'PD', rank: 4, totalPt: 0, yen: 0 },
        ],
      });
      const gR1 = mk('tc8-6a', 1, 2); // A勝ち
      const gR2 = mk('tc8-6b', 2, 1); // A負け
      const gR3NoB = {
        id: 'tc8-6c', mode: 'yonma', rules: baseRules,
        seats: [{ playerId: 'PA' }, { playerId: 'PE' }, { playerId: 'PC' }, { playerId: 'PD' }],
        events: [], status: 'finished', startedAt: Date.now() - 1000, endedAt: Date.now(),
        result: [
          { seat: 0, playerId: 'PA', rank: 1, totalPt: 20, yen: 0 },
          { seat: 1, playerId: 'PE', rank: 2, totalPt: -20, yen: 0 },
          { seat: 2, playerId: 'PC', rank: 3, totalPt: 0, yen: 0 },
          { seat: 3, playerId: 'PD', rank: 4, totalPt: 0, yen: 0 },
        ],
      };
      const riv = stats.rivalStats([gR1, gR2, gR3NoB], 'PA').find((r) => r.playerId === 'PB');
      check('TC-8-6 直対収支(同卓2局のみ・pt合計0)', riv ? riv.ptSum : NaN, 0);
      check('TC-8-6 直対勝敗1勝1敗(勝)', riv ? riv.win : NaN, 1);
      check('TC-8-6 直対勝敗1勝1敗(敗)', riv ? riv.lose : NaN, 1);

      // TC-8-7: 4人3麻の抜け番局は参加局数に入らない
      const g7 = {
        id: 'tc8-7', mode: 'yonin_sanma', rules: baseRules,
        seats: [{ playerId: 'PA' }, { playerId: 'PB' }, { playerId: 'PC' }, { playerId: 'PD' }],
        events: [{ type: 'WIN', winners: [{ seat: 0, directPoints: 1000 }], method: 'ron', loserSeat: 1 }],
        status: 'finished', startedAt: Date.now() - 1000, endedAt: Date.now(),
        result: [
          { seat: 0, playerId: 'PA', rank: 1, totalPt: 5, yen: 0 },
          { seat: 1, playerId: 'PB', rank: 3, totalPt: -5, yen: 0 },
          { seat: 2, playerId: 'PC', rank: 2, totalPt: 0, yen: 0 },
          { seat: 3, playerId: 'PD', rank: 4, totalPt: 0, yen: 0 },
        ],
      };
      const evD7 = stats.computeEventStats(g7, 3);
      const evA7 = stats.computeEventStats(g7, 0);
      check('TC-8-7 抜け番だった局は参加局数0', evD7.participatedKyoku, 0);
      check('TC-8-7 出場していた局は参加局数1', evA7.participatedKyoku, 1);
    }

    // TC-9 (F-32 エンコード/デコード。8.7章)
    {
      const payload = {
        v: 1,
        games: [{ id: 'g1', mode: 'yonma', seats: [{ playerId: 'PA' }], events: [], result: [], updatedAt: 1 }],
        players: [{ id: 'PA', name: 'テスト太郎', createdAt: 1, updatedAt: 1 }],
      };
      try {
        const encoded = await share.encodePayload(payload);
        const decoded = await share.decodePayload(encoded);
        checkBool('TC-9-1 エンコード/デコード往復一致', JSON.stringify(decoded) === JSON.stringify(payload));
        checkBool('TC-9-2 base64urlに+/=を含まない', !/[+/=]/.test(encoded.replace(/^raw:/, '')));
        try {
          await share.decodePayload(encoded.slice(0, -1));
          checkBool('TC-9-3 破損文字列は例外を投げる', false);
        } catch (e2) {
          checkBool('TC-9-3 破損文字列は例外を投げる', true);
        }
      } catch (e) {
        checkBool('TC-9 CompressionStream非対応環境(スキップ): ' + e, true);
      }
    }

    // TC-10 (v2.1: 焼き鳥ptの授受。8.5.1)
    {
      const baseRules = () => ({
        returnPoints: 30000, startPoints: 25000, uma: [10, 5, -5, -10], rounding: 'none', tieBreak: 'seatOrder',
        yakitori: { enabled: true, penaltyPt: 10, method: 'share' }, bustBonus: { enabled: false }, chip: { enabled: false },
      });
      const fp = [{ seat: 0, points: 40000 }, { seat: 1, points: 30000 }, { seat: 2, points: 20000 }, { seat: 3, points: 10000 }];
      // TC-10-1: 山分け・焼き鳥1人(4位)
      {
        const res = domain.settleGame(fp, 4, baseRules(), { yakitoriSeats: [3] });
        const by = Object.fromEntries(res.map((r) => [r.seat, r]));
        check('TC-10-1 焼き鳥者-10', by[3].bonusPt, -10);
        check('TC-10-1 1位+3.4(端数優先)', by[0].bonusPt, 3.4);
        check('TC-10-1 2位+3.3', by[1].bonusPt, 3.3);
        check('TC-10-1 3位+3.3', by[2].bonusPt, 3.3);
      }
      // TC-10-2: 山分け・焼き鳥2人
      {
        const rules = baseRules();
        const res = domain.settleGame(fp, 4, rules, { yakitoriSeats: [2, 3] });
        const by = Object.fromEntries(res.map((r) => [r.seat, r]));
        check('TC-10-2 焼き鳥2人 各-10(seat2)', by[2].bonusPt, -10);
        check('TC-10-2 焼き鳥2人 各-10(seat3)', by[3].bonusPt, -10);
        check('TC-10-2 非焼き鳥 各+10(seat0)', by[0].bonusPt, 10);
        check('TC-10-2 非焼き鳥 各+10(seat1)', by[1].bonusPt, 10);
      }
      // TC-10-3: 祝儀・焼き鳥1人
      {
        const rules = baseRules();
        rules.yakitori.method = 'perPlayer';
        const res = domain.settleGame(fp, 4, rules, { yakitoriSeats: [3] });
        const by = Object.fromEntries(res.map((r) => [r.seat, r]));
        check('TC-10-3 焼き鳥者-30(祝儀)', by[3].bonusPt, -30);
        check('TC-10-3 他3人 各+10(祝儀)', by[0].bonusPt, 10);
      }
      // TC-10-4: トップ総取り・焼き鳥1人が4位
      {
        const rules = baseRules();
        rules.yakitori.method = 'topTake';
        const res = domain.settleGame(fp, 4, rules, { yakitoriSeats: [3] });
        const by = Object.fromEntries(res.map((r) => [r.seat, r]));
        check('TC-10-4 4位-10', by[3].bonusPt, -10);
        check('TC-10-4 1位+10(トップ総取り)', by[0].bonusPt, 10);
        check('TC-10-4 2位は変動なし', by[1].bonusPt, 0);
      }
      // TC-10-5: 全員焼き鳥/全員回避 → 授受なし
      {
        const rules = baseRules();
        const resAll = domain.settleGame(fp, 4, rules, { yakitoriSeats: [0, 1, 2, 3] });
        checkBool('TC-10-5 全員焼き鳥→授受なし', resAll.every((r) => r.bonusPt === 0));
        const resNone = domain.settleGame(fp, 4, rules, { yakitoriSeats: [] });
        checkBool('TC-10-5 全員回避→授受なし', resNone.every((r) => r.bonusPt === 0));
      }
      // TC-10-6: 焼き鳥pt加算後も順位は加算前のまま
      {
        const rules = baseRules();
        rules.yakitori.method = 'topTake';
        rules.yakitori.penaltyPt = 5000; // 極端な値で総額の大小関係を反転させても
        const fpClose = [{ seat: 0, points: 25100 }, { seat: 1, points: 24900 }, { seat: 2, points: 25000 }, { seat: 3, points: 25000 }];
        const res = domain.settleGame(fpClose, 4, rules, { yakitoriSeats: [1] });
        const by = Object.fromEntries(res.map((r) => [r.seat, r]));
        checkBool('TC-10-6 順位は焼き鳥pt加算前のまま(rank1=seat0)', by[0].rank === 1);
      }
    }

    // TC-11 (v2.1: 箱下ボーナス・チップ円一本化・同点山分け。8.5.2/8.5)
    {
      // TC-11-1: 3位の和了で4位が箱下
      {
        const bb = domain.bustBonusSettlement([0, 1, 2, 3], { 0: 40000, 1: 30000, 2: 25000, 3: -2000 }, [{ seat: 3, bySeat: 2 }], 10);
        check('TC-11-1 3位+10(飛ばした者)', bb[2], 10);
        check('TC-11-1 4位-10(飛んだ者)', bb[3], -10);
      }
      // TC-11-2: ノーテン罰符で箱下(飛ばした者なし)→1位が獲得
      {
        const bb = domain.bustBonusSettlement([0, 1, 2, 3], { 0: 40000, 1: 30000, 2: 25000, 3: -500 }, [], 10);
        check('TC-11-2 飛んだ者-10', bb[3], -10);
        check('TC-11-2 1位+10(飛ばした者なし)', bb[0], 10);
      }
      // TC-11-3: チップは円のみに加算・ptは不変
      {
        const rulesChip = {
          returnPoints: 30000, startPoints: 25000, uma: [10, 5, -5, -10], rounding: 'none', tieBreak: 'seatOrder',
          yakitori: { enabled: false }, bustBonus: { enabled: false }, chip: { enabled: true, valuePerChip: 100 },
        };
        const fp3 = [{ seat: 0, points: 40000 }, { seat: 1, points: 30000 }, { seat: 2, points: 20000 }, { seat: 3, points: 10000 }];
        const withoutChip = domain.settleGame(fp3, 4, rulesChip, {});
        const withChip = domain.settleGame(fp3, 4, rulesChip, { chipCounts: { 0: 3, 1: -3, 2: 0, 3: 0 } });
        const w0 = withChip.find((r) => r.seat === 0);
        const w1 = withChip.find((r) => r.seat === 1);
        const n0 = withoutChip.find((r) => r.seat === 0);
        check('TC-11-3 +3枚→+300円', w0.chipYen, 300);
        check('TC-11-3 -3枚→-300円', w1.chipYen, -300);
        check('TC-11-3 チップはptに影響しない', w0.totalPt - n0.totalPt, 0);
      }
      // TC-11-4: 同点トップ2人(split)
      {
        const rulesSplit = {
          returnPoints: 30000, startPoints: 25000, uma: [10, 5, -5, -10], rounding: 'none', tieBreak: 'split',
          yakitori: { enabled: false }, bustBonus: { enabled: false }, chip: { enabled: false },
        };
        const fp4 = [{ seat: 0, points: 35000 }, { seat: 1, points: 35000 }, { seat: 2, points: 20000 }, { seat: 3, points: 10000 }];
        const res = domain.settleGame(fp4, 4, rulesSplit, {});
        const by = Object.fromEntries(res.map((r) => [r.seat, r]));
        check('TC-11-4 同点1位(seat0) ウマ+オカ=17.5', by[0].umaPt + by[0].okaPt, 17.5);
        check('TC-11-4 同点1位(seat1) ウマ+オカ=17.5', by[1].umaPt + by[1].okaPt, 17.5);
        check('TC-11-4 3位ウマ-5', by[2].umaPt, -5);
        check('TC-11-4 4位ウマ-10', by[3].umaPt, -10);
        check('TC-11-4 合計0', res.reduce((a, r) => a + r.totalPt, 0), 0);
      }
      // TC-11-5: tieBreak=seatOrder(デフォルト)は従来どおり(TC-2と同結果)
      {
        const rules = { returnPoints: 30000, startPoints: 25000, uma: [10, 5, -5, -10], rounding: 'round', tieBreak: 'seatOrder' };
        const finalPoints = [0, 1, 2, 3].map((s) => ({ seat: s, points: 25000 }));
        const res = domain.settleGame(finalPoints, 4, rules, {});
        const bySeat = Object.fromEntries(res.map((r) => [r.seat, r]));
        check('TC-11-5 seatOrderは従来どおり(1位25.0)', bySeat[0].totalPt, 25.0);
      }
    }

    // TC-12 (v2.1: 箱下終了。domain.isGameEndの判定一元化)
    {
      const rulesBustOn = { length: 'tonpu', bustEnd: true };
      const rulesBustOff = { length: 'tonpu', bustEnd: false };
      checkBool('TC-12-1 箱下終了有効→isGameEnd=true', domain.isGameEnd({ round: 'E', kyokuNum: 2, points: [1000, -100, 500, 200] }, rulesBustOn) === true);
      checkBool('TC-12-2 箱下終了無効→isGameEnd=false', domain.isGameEnd({ round: 'E', kyokuNum: 2, points: [1000, -100, 500, 200] }, rulesBustOff) === false);
      checkBool('TC-12-3 手動調整で-500→isGameEnd=true', domain.isGameEnd({ round: 'E', kyokuNum: 3, points: [2000, -500, 1000, 500] }, rulesBustOn) === true);
      checkBool('TC-12-4 Undoで復帰→isGameEnd=false', domain.isGameEnd({ round: 'E', kyokuNum: 3, points: [2000, 500, 1000, 500] }, rulesBustOn) === false);
    }

    return results;
  }

  async function render() {
    const results = await run();
    const pass = results.filter((r) => r.ok).length;
    const fail = results.length - pass;
    const rows = results
      .map(
        (r) =>
          '<div style="display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #e4e4e8;font-size:13.5px;">' +
          '<span>' + (r.ok ? '✅' : '❌') + ' ' + r.name + '</span>' +
          '<span style="font-variant-numeric:tabular-nums;color:' + (r.ok ? '#3d9440' : '#d64545') + ';">actual=' + r.actual + ' / expected=' + r.expected + '</span>' +
          '</div>'
      )
      .join('');
    document.getElementById('app').innerHTML =
      '<div style="padding:16px;font-family:-apple-system,sans-serif;">' +
      '<h1 style="font-size:20px;">自己テスト結果 (8.6〜8.7章 TC-1〜TC-12)</h1>' +
      '<div style="font-size:12px;color:#8a8a8e;margin-bottom:8px;">雀点 v' + APP_VERSION + ' ・ 仕様書 v' + SPEC_VERSION + '</div>' +
      '<div style="font-size:16px;font-weight:800;margin:10px 0;color:' + (fail === 0 ? '#3d9440' : '#d64545') + ';">' +
      (fail === 0 ? '✅ 全' + results.length + '件パス' : '❌ ' + fail + '件失敗 / 全' + results.length + '件') +
      '</div>' +
      '<div style="background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e4e4e8;">' + rows + '</div>' +
      '</div>';
  }

  return { run, render };
})();

// ==== bootstrap ====
(function () {
  'use strict';
  const params = new URLSearchParams(location.search);
  if (params.get('selftest') === '1') {
    document.getElementById('tabbar').classList.add('hidden');
    document.getElementById('app').classList.add('no-tabbar');
    selftest.render();
  } else {
    ui.init();
  }
})();
</script>
