<!DOCTYPE html>
<!--
  雀点 - 麻雀点数記録Webアプリ
  App Version: 2.1.0 (準拠する要件定義書・設計書 バージョン: 2.1 / 2026-07-20)
  単一HTMLファイル。ビルド不要。詳細はその他タブ > アプリ > バージョン情報を参照。
  v2.0: F-31(結果共有画像)/F-32(QR・URLデータ共有)/F-33(プレイヤー詳細統計)/F-34(場代精算)を追加。
  v2.1: 精算総点検(焼き鳥/箱下ボーナス/チップ/同点山分け)・設定選択制(7.6)・
        タップ/長押し実装要件(6.2.4)・入力シート回転(6.3.6)・F-35(会)・F-36(音声読み上げ)を追加。
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="application-version" content="2.1.0">
<title>雀点 - 麻雀点数記録</title>
<!-- F-32用: QRコード生成(2章で許可された唯一の追加CDNライブラリの一つ) -->
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<style>
:root{
  --bg:#f2f2f5;
  --card:#ffffff;
  --text:#1c1c1e;
  --sub:#8a8a8e;
  --line:#e4e4e8;
  --accent:#2e6bd1;
  --accent-dark:#1f4f9e;
  --red:#d64545;
  --green-felt:#3d9440;
  --green-felt-dark:#2c7530;
  --gold:#e8c04c;
  --danger:#d64545;
  --plus:#2e6bd1;
  --minus:#d64545;
  --radius:14px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  overscroll-behavior:none;}
body{display:flex;flex-direction:column;height:100dvh;overflow:hidden;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select{font-family:inherit;}
#app{flex:1;min-height:0;overflow-y:auto;position:relative;padding-bottom:calc(64px + var(--safe-bottom));}
#app.no-tabbar{padding-bottom:0;}

/* ===== Top bar ===== */
.topbar{position:sticky;top:0;z-index:20;background:rgba(242,242,245,.92);backdrop-filter:blur(10px);
  padding:calc(10px + var(--safe-top)) 14px 10px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--line);}
.topbar h1{font-size:17px;margin:0;font-weight:700;}
.topbar .side{display:flex;gap:6px;align-items:center;min-width:32px;}
.iconbtn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:transparent;font-size:18px;}
.iconbtn:active{background:rgba(0,0,0,.06);}
.textbtn{color:var(--accent);font-size:15px;font-weight:600;padding:6px 4px;}

/* ===== Tab bar ===== */
.tabbar{position:fixed;left:0;right:0;bottom:0;height:calc(56px + var(--safe-bottom));
  background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-top:1px solid var(--line);
  display:flex;z-index:30;padding-bottom:var(--safe-bottom);}
.tabbar.hidden{display:none;}
.tabbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  color:var(--sub);font-size:10.5px;}
.tabbtn .ic{font-size:21px;line-height:1;}
.tabbtn.active{color:var(--accent);}

/* ===== Lists / cards (iOS style) ===== */
.section-title{font-size:12.5px;color:var(--sub);margin:18px 16px 6px;font-weight:600;}
.card{background:var(--card);border-radius:var(--radius);margin:0 12px;overflow:hidden;}
.list-row{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;
  border-bottom:1px solid var(--line);gap:10px;}
.list-row:last-child{border-bottom:none;}
.list-row .label{font-size:15px;}
.list-row .value{font-size:14px;color:var(--sub);display:flex;align-items:center;gap:6px;}
.list-row .value.accent{color:var(--accent);}
.list-row.tap:active{background:#f5f5f7;}
.chev{color:#c7c7cc;font-size:16px;}

.btn{border-radius:12px;padding:13px 18px;font-size:16px;font-weight:700;text-align:center;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:active{background:var(--accent-dark);}
.btn-ghost{background:rgba(46,107,209,.1);color:var(--accent);}
.btn-danger-text{color:var(--red);background:none;font-weight:600;}
.btn:disabled{opacity:.4;pointer-events:none;}
.btn-block{display:block;width:100%;}

.seg{display:flex;background:#e6e6ea;border-radius:10px;padding:2px;margin:10px 12px;}
.seg button{flex:1;padding:8px 4px;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--text);}
.seg button.active{background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.15);}

.chips{display:flex;flex-wrap:wrap;gap:8px;padding:10px 14px;}
.chip{padding:8px 14px;border-radius:20px;background:#eef0f4;font-size:14px;font-weight:600;color:var(--text);}
.chip.selected{background:var(--accent);color:#fff;}
.chip.disabled{opacity:.35;pointer-events:none;}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 30px;color:var(--sub);text-align:center;gap:10px;}
.empty-state .big{font-size:40px;}

/* ===== Modal / sheet ===== */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:flex-end;
  animation:fadeIn .15s ease;}
.overlay.center{align-items:center;justify-content:center;padding:20px;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{background:var(--bg);width:100%;max-height:92dvh;border-radius:18px 18px 0 0;overflow:hidden;
  display:flex;flex-direction:column;animation:slideUp .2s ease;}
.sheet.full{max-height:100dvh;height:100dvh;border-radius:0;padding-top:var(--safe-top);}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:14px;
  border-bottom:1px solid var(--line);background:var(--card);flex-shrink:0;}
.sheet-header h2{font-size:16px;margin:0;font-weight:700;}
.sheet-body{overflow-y:auto;flex:1;padding-bottom:24px;}
.dialog{background:var(--card);border-radius:16px;width:100%;max-width:320px;padding:20px;text-align:center;}
.dialog p{font-size:14px;color:var(--sub);margin:8px 0 18px;}
.dialog .row{display:flex;gap:10px;}
.dialog .row button{flex:1;}

/* action sheet buttons */
.action-list{display:flex;flex-direction:column;gap:8px;padding:14px;}
.action-list button{background:var(--card);border-radius:12px;padding:16px;font-size:16px;font-weight:700;}
.action-list button.tsumo{color:var(--green-felt-dark);}
.action-list button.ron{color:var(--red);}
.action-list button.cancel{color:var(--sub);font-weight:600;}
.hint{font-size:12px;color:var(--sub);text-align:center;padding:0 20px 6px;}

/* ===== Participant setup ===== */
.pl-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);}
.pl-row:last-child{border-bottom:none;}
.wind-badge{width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;font-weight:700;
  font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pl-name{flex:1;font-size:15px;}
.pl-name.empty{color:var(--sub);}
.pl-move{display:flex;flex-direction:column;gap:2px;}
.pl-move button{font-size:11px;color:var(--sub);padding:2px 6px;}
.bottom-actions{position:fixed;left:0;right:0;bottom:0;padding:10px 14px calc(10px + var(--safe-bottom));
  background:rgba(242,242,245,.95);backdrop-filter:blur(10px);border-top:1px solid var(--line);
  display:flex;gap:8px;z-index:25;}
.bottom-actions.with-tabbar{bottom:calc(56px + var(--safe-bottom));padding-bottom:10px;}
.bottom-actions .btn{flex:1;}

/* ===== Game screen ===== */
#game-screen{position:fixed;inset:0;background:var(--green-felt);
  background-image:radial-gradient(ellipse at center, var(--green-felt) 0%, var(--green-felt-dark) 100%);
  z-index:5;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.game-topinfo{position:absolute;top:calc(8px + var(--safe-top));left:0;right:0;display:flex;justify-content:center;z-index:6;}
.kyoku-badge{background:rgba(0,0,0,.35);color:#fff;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:700;
  display:flex;gap:8px;align-items:center;letter-spacing:.5px;}
.game-corner{position:absolute;top:calc(8px + var(--safe-top));display:flex;gap:8px;z-index:6;}
.game-corner.left{left:8px;}
.game-corner.right{right:8px;}
.game-iconbtn{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.35);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:16px;}
.elapsed{background:rgba(0,0,0,.35);color:#fff;padding:6px 10px;border-radius:14px;font-size:12px;
  display:flex;align-items:center;}
.table-center{width:92px;height:92px;border-radius:50%;background:radial-gradient(circle,#2c7530,#255f28);
  display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 4px rgba(255,255,255,.08),0 4px 12px rgba(0,0,0,.3);
  color:#fff;font-size:12px;font-weight:700;text-align:center;line-height:1.3;border:none;z-index:6;
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);}
.table-center:active{transform:translate(-50%,-50%) scale(.96);}

/* ===== 6.2.2 席パネル(この通りに実装) ===== */
.seat        { position:absolute; width:min(88vw, 46dvh); display:flex; flex-direction:column; align-items:center; gap:5px; z-index:6; }
.seat.bottom { bottom:12px; left:50%; transform:translateX(-50%); }
.seat.top    { top:64px;   left:50%; transform:translateX(-50%) rotate(180deg); }
.seat.left   { left:0;  top:50%; transform-origin:center;
               transform:translate(calc(-50% + 52px), -50%) rotate(90deg); }
.seat.right  { right:0; top:50%; transform-origin:center;
               transform:translate(calc(50% - 52px), -50%) rotate(-90deg); }

.badges{display:flex;align-items:center;justify-content:center;gap:6px;min-height:20px;}
.badges .wind-mark{color:#ffe9a8;font-size:12px;font-weight:800;background:rgba(0,0,0,.3);border-radius:6px;padding:1px 6px;}
.badges .kihonten-mark{color:#3d2b00;font-size:10.5px;font-weight:800;background:var(--gold);border-radius:6px;padding:1px 6px;}
.badges .yakitori-mark{font-size:13px;}
.riichi-area{min-width:64px;height:14px;display:flex;align-items:center;justify-content:center;}
.riichi-stick{position:relative;width:64px;height:10px;background:#f4f0e6;border-radius:5px;box-shadow:0 1px 2px rgba(0,0,0,.3);}
.riichi-stick::after{content:'';position:absolute;left:50%;top:50%;width:6px;height:6px;border-radius:50%;
  background:#c73e3e;transform:translate(-50%,-50%);}

.scorebar{background:rgba(0,0,0,.55);border-radius:10px;padding:6px 10px;display:flex;align-items:center;gap:8px;
  min-width:170px;justify-content:space-between;}
.scorebar .pname{color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;gap:4px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;max-width:96px;}
.scorebar .pts{color:var(--gold);font-size:17px;font-weight:800;font-variant-numeric:tabular-nums;}
.diffbtn{width:30px;height:30px;border-radius:50%;background:#3a6fd8;color:#fff;font-size:15px;font-weight:800;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.diffbtn:active{transform:scale(.92);}

.actions{display:flex;gap:10px;}
.pbtn{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:20px;box-shadow:0 2px 6px rgba(0,0,0,.35);}
.pbtn.riichi{background:#c73e3e;color:#fff;}
.pbtn.riichi.active{background:var(--gold);color:#3d2b00;}
.pbtn.win{background:#2c2c30;color:#fff;}
.pbtn:active{transform:scale(.92);}

/* ===== 点差オーバーレイ(±タップ) ===== */
.diff-overlay{position:absolute;z-index:8;background:rgba(20,20,20,.92);border-radius:12px;padding:10px 12px;
  min-width:150px;box-shadow:0 4px 14px rgba(0,0,0,.4);}
.diff-overlay .row{display:flex;justify-content:space-between;gap:14px;font-size:13px;padding:3px 0;color:#fff;}
.diff-overlay .row .d.pos{color:#7fc9ff;font-weight:700;}
.diff-overlay .row .d.neg{color:#ff9d9d;font-weight:700;}
.seat.bottom .diff-overlay{bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);}
.seat.top .diff-overlay{top:calc(100% + 6px);left:50%;transform:translateX(-50%);}
.seat.left .diff-overlay{left:calc(100% + 6px);top:50%;transform:translateY(-50%);}
.seat.right .diff-overlay{right:calc(100% + 6px);top:50%;transform:translateY(-50%);}

/* ===== サイコロ演出 ===== */
.dice-overlay{position:absolute;inset:0;z-index:9;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.25);}
.dice-box{display:flex;gap:14px;align-items:center;}
.die{width:56px;height:56px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;
  font-size:30px;font-weight:800;box-shadow:0 4px 12px rgba(0,0,0,.4);color:#222;}
.die.rolling{animation:dieSpin .12s linear infinite;}
@keyframes dieSpin{from{transform:rotate(0deg) scale(1)}to{transform:rotate(20deg) scale(1.05)}}
.dice-sum{color:#fff;font-size:22px;font-weight:800;margin-left:10px;}

/* ===== numpad ===== */
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 14px;}
.numpad button{background:var(--card);border-radius:10px;padding:16px 0;font-size:20px;font-weight:600;}
.numpad button:active{background:#eee;}
.adjust-display{text-align:center;font-size:34px;font-weight:800;padding:16px;font-variant-numeric:tabular-nums;}
.sign-toggle{display:flex;gap:8px;padding:0 14px 10px;}
.sign-toggle button{flex:1;padding:10px;border-radius:10px;background:#eef0f4;font-weight:700;font-size:16px;}
.sign-toggle button.active.plus{background:var(--plus);color:#fff;}
.sign-toggle button.active.minus{background:var(--minus);color:#fff;}

/* ===== win sheet ===== */
.win-summary{background:var(--card);margin:10px 12px;border-radius:14px;overflow:hidden;}
.win-summary-head{display:flex;align-items:center;justify-content:space-between;padding:14px;}
.badge{padding:4px 10px;border-radius:8px;font-size:12px;font-weight:800;color:#fff;}
.badge.tsumo{background:var(--green-felt-dark);}
.badge.ron{background:var(--red);}
.accordion-item{border-top:1px solid var(--line);}
.accordion-head{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;}
.accordion-body{padding:0 14px 12px;}
.score-row{display:flex;justify-content:space-between;align-items:center;padding:11px 4px;border-top:1px solid var(--line);}
.score-row:first-child{border-top:none;}
.score-row .fu{font-size:14.5px;}
.score-row .pts{font-size:14.5px;font-weight:700;color:var(--accent);}
.score-row:active{background:#f5f5f7;}
.direct-row{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;border-top:1px solid var(--line);}
.direct-row .pts{font-weight:700;color:var(--accent);}

/* toast */
.toast{position:fixed;left:50%;bottom:calc(90px + var(--safe-bottom));transform:translateX(-50%);
  background:rgba(20,20,22,.92);color:#fff;padding:10px 18px;border-radius:12px;font-size:13.5px;
  z-index:200;max-width:88vw;text-align:center;animation:toastIn .2s ease;}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}

/* result screen */
.rank-card{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card);margin:8px 12px;border-radius:14px;}
.rank-num{width:30px;height:30px;border-radius:50%;background:#eef0f4;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:14px;flex-shrink:0;}
.rank-num.r1{background:var(--gold);color:#4a3800;}
.rank-info{flex:1;min-width:0;}
.rank-info .nm{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px;}
.rank-info .sub{font-size:12px;color:var(--sub);margin-top:2px;}
.rank-pt{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;}
.rank-pt.pos{color:var(--accent);}
.rank-pt.neg{color:var(--red);}

.game-list-card{background:var(--card);margin:8px 12px;border-radius:14px;padding:12px 14px;}
.game-list-head{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:8px;}
.mini-rank{display:flex;justify-content:space-between;font-size:13.5px;padding:3px 0;}
.mini-rank .pt.pos{color:var(--accent);font-weight:700;}
.mini-rank .pt.neg{color:var(--red);font-weight:700;}

.stat-row{display:flex;padding:12px 14px;border-bottom:1px solid var(--line);align-items:center;}
.stat-row:last-child{border-bottom:none;}
.stat-row .nm{flex:2;font-size:14.5px;font-weight:600;}
.stat-row .col{flex:1;text-align:right;font-size:13.5px;font-variant-numeric:tabular-nums;}
.stat-head{display:flex;padding:8px 14px;font-size:11.5px;color:var(--sub);font-weight:700;}
.stat-head .nm{flex:2;}
.stat-head .col{flex:1;text-align:right;}

.history-item{padding:11px 14px;border-bottom:1px solid var(--line);font-size:13.5px;display:flex;justify-content:space-between;gap:8px;}
.history-item .l{color:var(--sub);font-size:11.5px;flex-shrink:0;}
.history-item:active{background:#f5f5f7;}

textarea.memo{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:14px;
  min-height:70px;resize:vertical;background:var(--card);}
input.txt{border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:15px;width:100%;background:var(--card);}
label.flabel{font-size:12.5px;color:var(--sub);display:block;margin:12px 14px 4px;}

.svgchart{width:100%;height:220px;}

/* ===== 6.3.5 清算確認画面 ===== */
.settle-card{background:var(--card);border-radius:14px;margin:8px 12px;padding:13px 14px;}
.settle-row{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
.settle-name{font-size:15px;font-weight:700;}
.settle-delta{font-size:19px;font-weight:800;font-variant-numeric:tabular-nums;}
.settle-delta.pos{color:var(--plus);}
.settle-delta.neg{color:var(--minus);}
.settle-sub{font-size:12.5px;color:var(--sub);margin-top:3px;font-variant-numeric:tabular-nums;}
.settle-info-card{background:#eceef2;border-radius:14px;margin:10px 12px;padding:12px 14px;}
.settle-info-card .settle-info-title{font-size:12.5px;color:var(--sub);font-weight:700;margin-bottom:8px;}
.settle-info-block{padding:6px 0;border-top:1px solid #dcdee3;}
.settle-info-block:first-of-type{border-top:none;padding-top:0;}
.settle-info-block .l1{font-size:14px;font-weight:700;}
.settle-info-block .l2{font-size:12.5px;color:var(--sub);}
.settle-info-block .l3{font-size:14px;font-weight:700;color:var(--accent);}
.settle-info-line{font-size:13px;padding:4px 0;color:var(--text);}

/* ===== v2.0: 6.14 場代精算(F-34) ===== */
.venue-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--line);font-size:13.5px;}
.venue-row:last-child{border-bottom:none;}
.venue-row .nm{font-weight:700;}
.venue-row .sub{color:var(--sub);font-size:12px;}
.venue-row .final{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums;}
.venue-row .final.pos{color:var(--plus);}
.venue-row .final.neg{color:var(--minus);}
.venue-weights{display:flex;gap:8px;padding:0 14px 10px;flex-wrap:wrap;}
.venue-weights .wcell{flex:1;min-width:60px;}
.venue-weights .wcell label{font-size:11px;color:var(--sub);display:block;margin-bottom:2px;}
.venue-weights .wcell input{width:100%;border:1px solid var(--line);border-radius:8px;padding:6px 8px;font-size:13px;text-align:center;}
.venue-check-row{padding:8px 14px;font-size:12.5px;text-align:center;}
.venue-check-row.ok{color:var(--green-felt);}
.venue-check-row.err{color:var(--red);font-weight:700;}
.venue-transfer{padding:6px 14px;font-size:13px;display:flex;justify-content:space-between;border-bottom:1px solid var(--line);}
.venue-transfer:last-child{border-bottom:none;}
.stepper-row{display:flex;align-items:center;gap:10px;padding:0 14px 10px;}
.stepper-row input{flex:1;text-align:center;font-size:18px;font-weight:800;}

<script>
'use strict';
// ==== version ==== 要件定義書・設計書のバージョンに追従
const APP_VERSION = '2.1.0';
const SPEC_VERSION = '2.1';
const BUILD_DATE = '2026-07-20';
// ==== config ====(デプロイ時にここへ自分のGAS URLと合言葉を記入する。15.5)
// 個人サーバーにこのファイルを1枚置く運用を想定: ここに値を入れておけば、
// どの端末で開いても入力なしで同期が有効になる(localStorageの値があればそちらが優先)。
const APP_CONFIG = { gasUrl: '', token: '' };
// ==================================================================
// ==== domain ==== (pure functions, no DOM) — 8章・9章準拠
// Node-testable module. Will be inlined into index.html <script> later.

const domain = (function () {
  'use strict';

  // ---- 8.2 符・翻 → 基本点 ----
  // 役満N倍: hanが13以上のとき N = floor(han/13) as multiplier over 8000
  function basePointsWithLimit(han, fu, kiriageMangan) {
    if (han >= 13) {
      const n = Math.max(1, Math.floor(han / 13));
      return 8000 * n;
    }
    if (han >= 11) return 6000;
    if (han >= 8) return 4000;
    if (han >= 6) return 3000;
    if (han === 5) return 2000;
    let bp = fu * Math.pow(2, 2 + han);
    if (kiriageMangan && bp >= 2000) return 2000;
    if (bp > 2000) bp = 2000;
    return bp;
  }

  function ceil100(n) {
    return Math.ceil(n / 100) * 100;
  }

  // Returns payment breakdown for a win, before honba.
  // role: 'dealer' | 'child', method: 'ron' | 'tsumo'
  // returns { total, perPayer: {dealer?, child?, childEach?} }
  function winPayments(han, fu, role, method, opts) {
    opts = opts || {};
    const kiriage = !!opts.kiriageMangan;
    const bp = basePointsWithLimit(han, fu, kiriage);
    if (method === 'ron') {
      const mult = role === 'dealer' ? 6 : 4;
      const total = ceil100(bp * mult);
      return { total, detail: { payer: total } };
    } else {
      // tsumo
      if (role === 'dealer') {
        const each = ceil100(bp * 2);
        return { total: each * 3, detail: { childEach: each }, allSame: true };
      } else {
        const fromDealer = ceil100(bp * 2);
        const fromChild = ceil100(bp * 1);
        return {
          total: fromDealer + fromChild * 2,
          detail: { dealerPays: fromDealer, childPays: fromChild },
        };
      }
    }
  }

  // ---- fu/han validity per spec 6.3 ----
  function validFuOptions(han) {
    if (han === 1) return [30, 40, 50, 60, 70, 80, 90, 100, 110];
    if (han === 2) return [20, 25, 30, 40, 50, 60, 70, 80, 90, 100, 110];
    if (han === 3) return [20, 25, 30, 40, 50, 60];
    if (han === 4) return [20, 25, 30];
    return [];
  }

  // ---- 8.4 流局(ノーテン罰符) ----
  function drawSettlement(totalPenalty, tenpaiSeats, allSeats) {
    const t = tenpaiSeats.length;
    const n = allSeats.length - t;
    const result = {};
    allSeats.forEach((s) => (result[s] = 0));
    if (t === 0 || n === 0) return result; // 全員テンパイ/ノーテンは授受なし
    const tenpaiGain = totalPenalty / t;
    const notenLoss = totalPenalty / n;
    // 100点未満端数丸め、差分は上家(seat番号が小さい方)優先で調整
    const tenpaiEach = Math.round(tenpaiGain / 100) * 100;
    const notenEach = Math.round(notenLoss / 100) * 100;
    let tenpaiTotal = 0,
      notenTotal = 0;
    allSeats.forEach((s) => {
      if (tenpaiSeats.includes(s)) {
        result[s] = tenpaiEach;
        tenpaiTotal += tenpaiEach;
      } else {
        result[s] = -notenEach;
        notenTotal += notenEach;
      }
    });
    // adjust rounding diff onto first (kamicha-priority = lowest seat index) member of each group
    const tenpaiDiff = totalPenalty - tenpaiTotal;
    if (tenpaiDiff !== 0) {
      const firstT = allSeats.find((s) => tenpaiSeats.includes(s));
      result[firstT] += tenpaiDiff;
    }
    const notenDiff = totalPenalty - notenTotal;
    if (notenDiff !== 0) {
      const firstN = allSeats.find((s) => !tenpaiSeats.includes(s));
      result[firstN] -= notenDiff;
    }
    return result;
  }

  // ---- 8.5 最終精算 ----
  function round(value, mode) {
    switch (mode) {
      case 'round':
        return Math.round(value);
      case 'round56': {
        // 五捨六入: like round but .5 rounds down, .6 rounds up -> effectively floor(x+0.4)... approximate:
        const f = Math.floor(value);
        const diff = value - f;
        return diff >= 0.6 ? f + 1 : f;
      }
      case 'floor':
        return Math.floor(value);
      case 'ceil':
        return Math.ceil(value);
      case 'none':
        return Math.round(value * 10) / 10;
      default:
        return Math.round(value);
    }
  }

  // 0.1pt単位切り捨て+余りを先頭(=起家/上位に近い順)から+0.1ptずつ配分し、合計を厳密に一致させる
  function splitWithRemainder(total, n) {
    if (n <= 0) return [];
    const base = Math.floor((total / n) * 10) / 10;
    const distributed = Math.round(base * n * 10) / 10;
    let remainderUnits = Math.round((total - distributed) * 10);
    const out = [];
    for (let i = 0; i < n; i++) {
      let v = base;
      if (i < remainderUnits) v = Math.round((v + 0.1) * 10) / 10;
      out.push(v);
    }
    return out;
  }

  // ---- v2.1(8.5.1): 焼き鳥ptの授受(唯一の正) ----
  // seatsInRankOrder: 最終順位順(1位→最下位)の席番号配列。yakitoriSeats: 焼き鳥(未和了)の席番号配列。
  function yakitoriSettlement(seatsInRankOrder, yakitoriSeats, method, P) {
    const result = {};
    seatsInRankOrder.forEach((s) => (result[s] = 0));
    if (!P) return result;
    const yakiSet = new Set(yakitoriSeats || []);
    const yakitoriList = seatsInRankOrder.filter((s) => yakiSet.has(s));
    const nonYakitoriList = seatsInRankOrder.filter((s) => !yakiSet.has(s));
    const y = yakitoriList.length;
    const m = nonYakitoriList.length;
    if (y === 0 || m === 0) return result;
    if (method === 'perPlayer') {
      yakitoriList.forEach((s) => (result[s] = -P * m));
      nonYakitoriList.forEach((s) => (result[s] = P * y));
    } else if (method === 'topTake') {
      yakitoriList.forEach((s) => (result[s] = -P));
      result[nonYakitoriList[0]] = (result[nonYakitoriList[0]] || 0) + P * y;
    } else {
      // share(山分け・デフォルト)
      yakitoriList.forEach((s) => (result[s] = -P));
      const shares = splitWithRemainder(P * y, m);
      nonYakitoriList.forEach((s, i) => (result[s] = shares[i]));
    }
    return result;
  }

  // ---- v2.1(8.5.2): 箱下ボーナスの授受(唯一の正) ----
  // finalPointsBySeat: { seat: 終局時持ち点 }。bustCausedBy: [{seat, bySeat?}] (bySeat省略=飛ばした者なし)
  function bustBonusSettlement(seatsInRankOrder, finalPointsBySeat, bustCausedBy, N) {
    const result = {};
    seatsInRankOrder.forEach((s) => (result[s] = 0));
    if (!N) return result;
    const bustedSeats = seatsInRankOrder.filter((s) => (finalPointsBySeat[s] || 0) < 0);
    if (bustedSeats.length === 0) return result;
    let leftoverForTop = 0;
    bustedSeats.forEach((seat) => {
      result[seat] -= N;
      const causer = (bustCausedBy || []).find((b) => b.seat === seat);
      if (causer && causer.bySeat != null) {
        result[causer.bySeat] = (result[causer.bySeat] || 0) + N;
      } else {
        leftoverForTop += N;
      }
    });
    if (leftoverForTop > 0) {
      const top = seatsInRankOrder[0];
      result[top] = (result[top] || 0) + leftoverForTop;
    }
    return result;
  }

  // extras = { yakitoriSeats?: number[], bustCausedBy?: {seat, bySeat?}[], chipCounts?: {[seat]: number} }
  // chipCounts: 席番号→チップ枚数の増減(最終枚数−初期枚数)。ptには影響せず円換算にのみ加算。
  function settleGame(finalPoints, seatCount, rules, extras) {
    extras = extras || {};
    const returnPoints = rules.returnPoints;
    const startPoints = rules.startPoints;
    const uma = rules.uma;
    const finalPointsBySeat = {};
    finalPoints.forEach((p) => (finalPointsBySeat[p.seat] = p.points));

    // 順位グループ化(同点はtieBreakに応じて処理)
    const sorted = [...finalPoints].sort((a, b) => {
      if (b.points !== a.points) return b.points - a.points;
      return a.seat - b.seat; // 起家に近い(席番号が小さい)方を上位とする既定の並び
    });
    const groups = [];
    sorted.forEach((r) => {
      const g = groups[groups.length - 1];
      if (g && g[0].points === r.points && rules.tieBreak === 'split') g.push(r);
      else groups.push([r]);
    });

    const oka = ((returnPoints - startPoints) * seatCount) / 1000;
    const results = [];
    const seatsInRankOrder = [];
    let rankCursor = 1;
    groups.forEach((group) => {
      const rankStart = rankCursor;
      const size = group.length;
      if (size > 1) {
        // 同点山分け(8.5手順2)
        let umaSum = 0;
        for (let k = 0; k < size; k++) umaSum += uma[rankStart - 1 + k] !== undefined ? uma[rankStart - 1 + k] : 0;
        const umaShares = splitWithRemainder(umaSum, size);
        const includesTop = rankStart === 1;
        const okaShares = includesTop ? splitWithRemainder(oka, size) : group.map(() => 0);
        group.forEach((r, i) => {
          const rawPt = (r.points - returnPoints) / 1000;
          results.push({ seat: r.seat, points: r.points, rank: rankStart, rawPt, umaPt: umaShares[i], okaPt: okaShares[i] });
          seatsInRankOrder.push(r.seat);
        });
      } else {
        const r = group[0];
        const rank = rankStart;
        const rawPt = (r.points - returnPoints) / 1000;
        const umaPt = uma[rank - 1] !== undefined ? uma[rank - 1] : 0;
        const okaPt = rank === 1 ? oka : 0;
        results.push({ seat: r.seat, points: r.points, rank, rawPt, umaPt, okaPt });
        seatsInRankOrder.push(r.seat);
      }
      rankCursor += size;
    });

    // 8.5.1/8.5.2: 焼き鳥pt・箱下ボーナスptを順位確定後に加算(bonusPtとして計上)
    const yakitoriPt = rules.yakitori && rules.yakitori.enabled
      ? yakitoriSettlement(seatsInRankOrder, extras.yakitoriSeats, rules.yakitori.method || 'share', rules.yakitori.penaltyPt)
      : {};
    const bustBonusPt = rules.bustBonus && rules.bustBonus.enabled
      ? bustBonusSettlement(seatsInRankOrder, finalPointsBySeat, extras.bustCausedBy, rules.bustBonus.pt)
      : {};
    results.forEach((r) => {
      const bonusPt = Math.round((((yakitoriPt[r.seat] || 0) + (bustBonusPt[r.seat] || 0)) * 10)) / 10;
      r.bonusPt = bonusPt;
      r.totalPtExact = r.rawPt + r.umaPt + r.okaPt + bonusPt;
    });

    // 端数処理を各pt_iに適用し、合計0になるよう1位へ差分を寄せる
    let sum = 0;
    results.forEach((r) => {
      r.totalPt = round(r.totalPtExact, rules.rounding);
      sum += r.totalPt;
    });
    if (sum !== 0) {
      const top = results.find((r) => r.rank === 1);
      top.totalPt = Math.round((top.totalPt - sum) * 10) / 10;
    }

    // v2.1: チップ円(ptには含めない。円換算にのみ加算)
    if (rules.chip && rules.chip.enabled && extras.chipCounts) {
      results.forEach((r) => {
        r.chipYen = (extras.chipCounts[r.seat] || 0) * rules.chip.valuePerChip;
      });
    }
    return results;
  }

  // ---- 9章 局進行 ----
  // state: { round: 'E'|'S'|'W'|'N', kyokuNum: 1..4, honba: 0, riichiSticks: 0, dealerSeat: 0 }
  function nextStateAfterWin(state, winnerIsDealer, dealerWinRotates) {
    const s = { ...state };
    if (winnerIsDealer && !dealerWinRotates) {
      s.honba += 1; // 連荘
    } else {
      s.honba = 0;
      advanceKyoku(s);
    }
    return s;
  }

  function nextStateAfterDraw(state, dealerTenpai) {
    const s = { ...state };
    s.honba += 1;
    if (!dealerTenpai) {
      advanceKyoku(s);
    }
    return s;
  }

  const ROUND_ORDER = ['E', 'S', 'W', 'N'];
  function advanceKyoku(s) {
    s.kyokuNum += 1;
    if (s.kyokuNum > 4) {
      s.kyokuNum = 1;
      const idx = ROUND_ORDER.indexOf(s.round);
      s.round = ROUND_ORDER[Math.min(idx + 1, ROUND_ORDER.length - 1)];
    }
  }

  // v2.1: state.points があれば箱下判定(rules.bustEnd)も同一関数で完結させる(判定一元化MUST)
  function isGameEnd(state, rules) {
    if (rules.bustEnd && Array.isArray(state.points) && state.points.some((p) => p < 0)) {
      return true;
    }
    const lastRound = rules.length === 'tonpu' ? 'E' : rules.length === 'hanchan' ? 'S' : 'W';
    const idx = ROUND_ORDER.indexOf(state.round);
    const lastIdx = ROUND_ORDER.indexOf(lastRound);
    return idx > lastIdx || (idx === lastIdx && state.kyokuNum > 4);
  }

  // ---- 6.14.3 場代精算(F-34。唯一の正) ----
  // seatsByRank: 順位順(1位→最下位)の席番号配列
  // weights: method='weighted'時のみ。順位順%(合計100)
  // betYenBySeat: { [seat]: 賭け収支円(賭け無効時は0) }
  function venueSettlement(totalYen, method, weights, seatsByRank, betYenBySeat) {
    const n = seatsByRank.length;
    let raw;
    if (method === 'topExempt') {
      raw = seatsByRank.map((_, i) => (i === 0 ? 0 : totalYen / (n - 1)));
    } else if (method === 'weighted') {
      raw = seatsByRank.map((_, i) => (totalYen * ((weights && weights[i]) || 0)) / 100);
    } else {
      raw = seatsByRank.map(() => totalYen / n);
    }
    // 2) 10円単位に切り上げ
    const burden = raw.map((v) => Math.ceil(v / 10) * 10);
    // 3) 過徴収額を上位から10円ずつ減じて一致させる
    let over = burden.reduce((a, b) => a + b, 0) - totalYen;
    let idx = 0;
    let guard = 0;
    while (over > 0 && guard < n * 200) {
      if (burden[idx] >= 10) {
        burden[idx] -= 10;
        over -= 10;
      }
      idx = (idx + 1) % n;
      guard++;
    }
    return seatsByRank.map((seat, i) => {
      const betYen = (betYenBySeat && betYenBySeat[seat]) || 0;
      const burdenYen = burden[i];
      return { seat, betYen, burdenYen, finalYen: betYen - burdenYen };
    });
  }

  // 立替者Pを介した星型送金リスト。Pが未指定ならば空配列。
  function venueTransfers(settlements, payerSeat) {
    if (payerSeat == null || payerSeat < 0) return [];
    const list = [];
    settlements.forEach((s) => {
      if (s.seat === payerSeat) return;
      if (s.finalYen < 0) list.push({ from: s.seat, to: payerSeat, amount: -s.finalYen });
      else if (s.finalYen > 0) list.push({ from: payerSeat, to: s.seat, amount: s.finalYen });
    });
    return list;
  }

  return {
    basePointsWithLimit,
    winPayments,
    validFuOptions,
    drawSettlement,
    settleGame,
    round,
    nextStateAfterWin,
    nextStateAfterDraw,
    isGameEnd,
    ceil100,
    ROUND_ORDER,
    venueSettlement,
    venueTransfers,
    yakitoriSettlement,
    bustBonusSettlement,
    splitWithRemainder,
  };
})();

if (typeof module !== 'undefined') module.exports = domain;

// ==== engine ==== (event-sourced game state; uses domain for math)
const engine = (function () {
  'use strict';

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  function initialState(game) {
    const n = game.seats.length;
    return {
      round: 'E',
      kyokuNum: 1,
      honba: 0,
      sticks: 0,
      dealerIdx: 0, // index into game.seats
      points: game.seats.map(() => game.rules.startPoints),
      riichi: game.seats.map(() => false),
      everWon: game.seats.map(() => false), // 焼き鳥判定(和了したことがあるか)
      benchIdx: game.mode === 'yonin_sanma' ? 3 : -1, // 抜け番(4人3麻)。起家0が座り、3番目(北位置)が最初の抜け番という単純化
      waremeSeat: -1, // 割れ目席(サイコロで決定。-1=未設定)
      seatOrder: game.seats.map((_, i) => i), // current physical seat->player mapping index (for SEAT_MOVE)
      finished: false,
      stats: game.seats.map(() => ({ wins: 0, deals: 0, riichis: 0, chombo: 0 })),
    };
  }

  // 現在の風(東南西北)を席インデックスから算出: 現在の親が常に東
  function currentWind(state, seatIdx, n) {
    const rel = (seatIdx - state.dealerIdx + n) % n;
    return ['E', 'S', 'W', 'N'][rel];
  }

  // active (playing) seat indices this kyoku, excluding bench for yonin_sanma
  function activeSeats(state, game) {
    const all = game.seats.map((_, i) => i);
    if (game.mode !== 'yonin_sanma') return all;
    return all.filter((i) => i !== state.benchIdx);
  }

  function cloneState(s) {
    return JSON.parse(JSON.stringify(s));
  }

  // 割目(7.5): 割れ目席が絡む1対1の授受を2倍にする。ツモ・流局・チョンボ等の
  // 多者間精算は「誰と誰の間の授受か」が一意でないため、本実装では簡略化として
  // 倍率を適用せず素点のまま処理する(割目はデフォルト無効のローカルルールのため)。
  function waremeMult(s, game, seatA, seatB) {
    if (!game.rules.wareme || s.waremeSeat < 0) return 1;
    return seatA === s.waremeSeat || seatB === s.waremeSeat ? 2 : 1;
  }
  function transfer(s, game, from, to, amount) {
    const mult = waremeMult(s, game, from, to);
    s.points[from] -= amount * mult;
    s.points[to] += amount * mult;
  }

  function applyEvent(state, game, ev) {
    const s = cloneState(state);
    const n = game.seats.length;
    switch (ev.type) {
      case 'RIICHI':
        s.points[ev.seat] -= 1000;
        s.sticks += 1;
        s.riichi[ev.seat] = true;
        break;
      case 'RIICHI_CANCEL':
        s.points[ev.seat] += 1000;
        s.sticks -= 1;
        s.riichi[ev.seat] = false;
        break;
      case 'ADJUST':
        s.points[ev.seat] += ev.delta;
        break;
      case 'CHIP':
        break; // chips tracked separately (not seat points)
      case 'DRAW': {
        const active = activeSeats(s, game);
        const penaltyTotal = game.rules.notenPenaltyTotal;
        const delta = domain.drawSettlement(penaltyTotal, ev.tenpaiSeats, active);
        active.forEach((seat) => {
          s.points[seat] += delta[seat] || 0;
        });
        const dealerSeatPhysical = active.includes(s.dealerIdx) ? s.dealerIdx : active[0];
        const dealerTenpai = ev.special ? true : ev.tenpaiSeats.includes(s.dealerIdx);
        const next = domain.nextStateAfterDraw(
          { round: s.round, kyokuNum: s.kyokuNum, honba: s.honba },
          dealerTenpai
        );
        s.round = next.round;
        s.kyokuNum = next.kyokuNum;
        s.honba = next.honba;
        // 次局に向けてリーチフラグをリセット(供託の本数=s.sticksは繰り越すが、
        // 「今回のリーチ」フラグは新しい局の開始とともにクリアする。WINケースと同様の処理)
        active.forEach((seat) => (s.riichi[seat] = false));
        if (!dealerTenpai) advanceDealerAndBench(s, game);
        break;
      }
      case 'WIN': {
        const active = activeSeats(s, game);
        const honbaBonus = game.rules.honbaValue * s.honba;
        let winnerIsDealer = false;
        ev.winners.forEach((w, wi) => {
          const role = w.seat === s.dealerIdx ? 'dealer' : 'child';
          if (role === 'dealer') winnerIsDealer = true;
          let total, dealerPays, childPays, allSame, childEach;
          if (w.directPoints != null) {
            total = w.directPoints;
          } else {
            const pay = domain.winPayments(w.han, w.fu, role, ev.method);
            total = pay.total;
            dealerPays = pay.detail.dealerPays;
            childPays = pay.detail.childPays;
            childEach = pay.detail.childEach;
            allSame = pay.allSame;
          }
          if (ev.method === 'ron') {
            const loser = ev.loserSeat;
            const addHonba = wi === 0 ? honbaBonus : 0; // 頭ハネ想定: 先頭のみ本場受取(単独ロンなら常にwi=0)
            transfer(s, game, loser, w.seat, total + addHonba);
            s.stats[loser].deals += 1;
          } else {
            // tsumo: split among all OTHER active seats
            const others = active.filter((x) => x !== w.seat);
            if (allSame) {
              others.forEach((o) => {
                s.points[o] -= childEach;
              });
              s.points[w.seat] += childEach * others.length;
            } else {
              others.forEach((o) => {
                const pay = o === s.dealerIdx ? dealerPays : childPays;
                s.points[o] -= pay;
                s.points[w.seat] += pay;
              });
              // 3人麻雀ツモ損無し設定は簡略化(2人分のみ収受がデフォルト仕様)
            }
            const honbaEach = Math.ceil((honbaBonus / others.length) / 100) * 100;
            others.forEach((o) => {
              s.points[o] -= honbaEach;
            });
            s.points[w.seat] += honbaEach * others.length;
          }
          s.stats[w.seat].wins += 1;
          s.everWon[w.seat] = true;
        });
        // 供託: 和了者(先頭)が全額回収
        const firstWinner = ev.winners[0].seat;
        s.points[firstWinner] += s.sticks * 1000;
        s.sticks = 0;
        active.forEach((seat) => (s.riichi[seat] = false));
        const next = domain.nextStateAfterWin(
          { round: s.round, kyokuNum: s.kyokuNum, honba: s.honba },
          winnerIsDealer,
          game.rules.dealerWinRotates
        );
        s.round = next.round;
        s.kyokuNum = next.kyokuNum;
        s.honba = next.honba;
        if (!(winnerIsDealer && !game.rules.dealerWinRotates)) advanceDealerAndBench(s, game);
        break;
      }
      case 'CHOMBO': {
        const offender = ev.seat;
        const isDealer = offender === s.dealerIdx;
        const active = activeSeats(s, game);
        const others = active.filter((x) => x !== offender);
        if (ev.penalty === 'mangan') {
          if (isDealer) {
            others.forEach((o) => {
              s.points[o] += 4000;
              s.points[offender] -= 4000;
            });
          } else {
            others.forEach((o) => {
              const amt = o === s.dealerIdx ? 4000 : 2000;
              s.points[o] += amt;
              s.points[offender] -= amt;
            });
          }
        } else if (ev.penalty === 'fixed') {
          others.forEach((o) => {
            s.points[o] += ev.value;
            s.points[offender] -= ev.value;
          });
        }
        // pt penalty (精算時pt減算) はゲーム終了時処理・ここでは未反映
        s.stats[offender].chombo += 1;
        // 局・本場据置き、リーチ棒は宣言者へ返却
        active.forEach((seat) => {
          if (s.riichi[seat]) {
            s.points[seat] += 1000;
            s.riichi[seat] = false;
          }
        });
        s.sticks = 0;
        break;
      }
      case 'WAREME_SET':
        s.waremeSeat = ev.seat;
        break;
      case 'SEAT_MOVE':
        s.seatOrder = ev.newOrder;
        break;
      default:
        break;
    }
    return s;
  }

  function advanceDealerAndBench(s, game) {
    const n = game.seats.length;
    if (game.mode === 'yonin_sanma') {
      // 抜け番ローテーション: 起家→南→西→北の順(seat index順)に抜ける
      s.benchIdx = (s.benchIdx + 1) % n;
      const active = activeSeats(s, game);
      const curPos = active.indexOf(s.dealerIdx);
      s.dealerIdx = curPos === -1 ? active[0] : active[(curPos + 1) % active.length];
    } else {
      s.dealerIdx = (s.dealerIdx + 1) % n;
    }
  }

  function deriveState(game) {
    let s = initialState(game);
    (game.events || []).forEach((ev) => {
      s = applyEvent(s, game, ev);
    });
    s.finished = domain.isGameEnd(
      { round: s.round, kyokuNum: s.kyokuNum, points: s.points },
      game.rules
    );
    return s;
  }

  function kyokuLabel(state) {
    const roundNames = { E: '東', S: '南', W: '西', N: '北' };
    return roundNames[state.round] + state.kyokuNum + '局';
  }

  function eventDescription(game, ev, seatNames) {
    const nm = (i) => (seatNames[i] || ('P' + i));
    switch (ev.type) {
      case 'RIICHI':
        return nm(ev.seat) + ' リーチ';
      case 'RIICHI_CANCEL':
        return nm(ev.seat) + ' リーチ取消';
      case 'DRAW':
        return ev.special ? '特殊流局' : '流局(テンパイ:' + ev.tenpaiSeats.map(nm).join('・') + ')';
      case 'ADJUST':
        return nm(ev.seat) + ' 点数調整 ' + (ev.delta > 0 ? '+' : '') + ev.delta + (ev.memo ? '(' + ev.memo + ')' : '');
      case 'CHOMBO':
        return nm(ev.seat) + ' チョンボ';
      case 'WIN': {
        const w = ev.winners[0];
        const scoreTxt = w.directPoints != null ? w.directPoints + '点' : w.han + '翻' + w.fu + '符';
        if (ev.method === 'ron') {
          return nm(w.seat) + ' ロン ←' + nm(ev.loserSeat) + ' ' + scoreTxt + (ev.winners.length > 1 ? ' 他' + (ev.winners.length - 1) + '名' : '');
        }
        return nm(w.seat) + ' ツモ ' + scoreTxt;
      }
      case 'WAREME_SET':
        return nm(ev.seat) + ' を割れ目に設定';
      case 'SEAT_MOVE':
        return '席移動';
      default:
        return ev.type;
    }
  }

  return { uid, initialState, applyEvent, deriveState, activeSeats, kyokuLabel, eventDescription, currentWind };
})();

// ==== storage ==== (localStorage, all values JSON strings)
const storage = (function () {
  'use strict';
  function get(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      if (raw == null) return fallback;
      return JSON.parse(raw);
    } catch (e) {
      return fallback;
    }
  }
  function set(key, value) {
    try {
      localStorage.setItem(key, JSON.stringify(value));
    } catch (e) {
      console.error('storage.set failed', key, e);
    }
  }
  function remove(key) {
    localStorage.removeItem(key);
  }

  const K = {
    players: 'mj.players',
    games: 'mj.games',
    activeGame: 'mj.activeGame',
    rules: (mode) => 'mj.rules.' + mode,
    rulePresets: 'mj.rulePresets',
    folders: 'mj.folders',
    sessions: 'mj.sessions',
    shareLogs: 'mj.shareLogs',
    app: 'mj.app',
    syncQueue: 'mj.sync.queue',
    syncConfig: 'mj.sync.config',
  };

  function defaultRules(mode) {
    const base = {
      mode,
      length: 'tonpu',
      extension: { enabled: false, threshold: 30000 },
      bustEnd: true,
      notenPenaltyTotal: 3000,
      honbaValue: 300,
      yakitori: { enabled: false, penaltyPt: 10, method: 'share' },
      rounding: 'round',
      bustBonus: { enabled: false, pt: 10 },
      tieBreak: 'seatOrder',
      bet: { enabled: false, ratePerPt: 50 },
      chip: { enabled: false, initial: 0, valuePerChip: 100 },
      wareme: false,
      riichiUnderZero: false,
      dealerWinRotates: false,
      riichiStickReceiver: 'atamahane',
      tsumoLoss: true,
      kiriageMangan: false,
    };
    if (mode === 'yonma') {
      return Object.assign(base, { startPoints: 25000, returnPoints: 30000, uma: [10, 5, -5, -10] });
    } else {
      // sanma / yonin_sanma
      base.notenPenaltyTotal = 2000;
      base.honbaValue = 200;
      return Object.assign(base, { startPoints: 30000, returnPoints: 35000, uma: [15, -5, -10] });
    }
  }

  function getRules(mode) {
    return get(K.rules(mode), defaultRules(mode));
  }
  function setRules(mode, rules) {
    set(K.rules(mode), rules);
  }

  function getPlayers() {
    return get(K.players, []);
  }
  function setPlayers(list) {
    set(K.players, list);
  }

  function getGames() {
    return get(K.games, []);
  }
  function setGames(list) {
    set(K.games, list);
  }
  function saveGame(game) {
    const games = getGames();
    const idx = games.findIndex((g) => g.id === game.id);
    game.updatedAt = Date.now();
    if (idx >= 0) games[idx] = game;
    else games.push(game);
    setGames(games);
  }

  function getActiveGame() {
    return get(K.activeGame, null);
  }
  function setActiveGame(game) {
    if (game) game.updatedAt = Date.now();
    set(K.activeGame, game);
  }

  function getApp() {
    return get(K.app, { serialSeq: 0, lang: 'ja' });
  }
  function setApp(app) {
    set(K.app, app);
  }
  function nextSerial() {
    const app = getApp();
    app.serialSeq = (app.serialSeq || 0) + 1;
    setApp(app);
    return app.serialSeq;
  }

  function getFolders() {
    return get(K.folders, []);
  }
  function setFolders(v) {
    set(K.folders, v);
  }
  // ---- v2.1(F-35): 会(セッション) ----
  function getSessions() {
    return get(K.sessions, []);
  }
  function setSessions(v) {
    set(K.sessions, v);
  }
  function getActiveSession() {
    return getSessions().find((s) => !s.endedAt && !s.deleted) || null;
  }
  function getShareLogs() {
    return get(K.shareLogs, []);
  }
  function setShareLogs(v) {
    set(K.shareLogs, v);
  }
  function getPresets() {
    return get(K.rulePresets, []);
  }
  function setPresets(v) {
    set(K.rulePresets, v);
  }

  function getSyncConfig() {
    return get(K.syncConfig, { url: '', token: '', lastSyncAt: null });
  }
  function setSyncConfig(v) {
    set(K.syncConfig, v);
  }
  function getSyncQueue() {
    return get(K.syncQueue, []);
  }
  function setSyncQueue(v) {
    set(K.syncQueue, v);
  }
  function queuePush(kind, payload) {
    const q = getSyncQueue();
    q.push({ id: engine.uid(), kind, payload, at: Date.now() });
    setSyncQueue(q);
  }

  return {
    K,
    get,
    set,
    remove,
    defaultRules,
    getRules,
    setRules,
    getPlayers,
    setPlayers,
    getGames,
    setGames,
    saveGame,
    getActiveGame,
    setActiveGame,
    getApp,
    setApp,
    nextSerial,
    getFolders,
    setFolders,
    getSessions,
    setSessions,
    getActiveSession,
    getShareLogs,
    setShareLogs,
    getPresets,
    setPresets,
    getSyncConfig,
    setSyncConfig,
    getSyncQueue,
    setSyncQueue,
    queuePush,
  };
})();

// ==== sync(GAS) ==== Googleスプレッドシート連携(15章)
const sync = (function () {
  'use strict';

  function cfg() {
    return storage.getSyncConfig();
  }
  function isConfigured() {
    const c = cfg();
    return !!(c.url && c.token);
  }

  async function ping() {
    const c = cfg();
    if (!c.url) return { ok: false, error: 'not_configured' };
    try {
      const res = await fetch(c.url + '?action=ping&token=' + encodeURIComponent(c.token), { redirect: 'follow' });
      return await res.json();
    } catch (e) {
      return { ok: false, error: String(e) };
    }
  }

  async function list() {
    const c = cfg();
    if (!c.url) return { ok: false, error: 'not_configured' };
    try {
      const res = await fetch(c.url + '?action=list&token=' + encodeURIComponent(c.token), { redirect: 'follow' });
      return await res.json();
    } catch (e) {
      return { ok: false, error: String(e) };
    }
  }

  async function getGames(ids) {
    const c = cfg();
    if (!c.url) return { ok: false, error: 'not_configured' };
    try {
      const res = await fetch(
        c.url + '?action=get&token=' + encodeURIComponent(c.token) + '&ids=' + encodeURIComponent(ids.join(',')),
        { redirect: 'follow' }
      );
      return await res.json();
    } catch (e) {
      return { ok: false, error: String(e) };
    }
  }

  async function postAction(action, body) {
    const c = cfg();
    if (!c.url) return { ok: false, error: 'not_configured' };
    try {
      const res = await fetch(c.url, {
        method: 'POST',
        redirect: 'follow',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(Object.assign({ token: c.token, action }, body)),
      });
      return await res.json();
    } catch (e) {
      return { ok: false, error: String(e) };
    }
  }

  function upsertGames(games) {
    return postAction('upsertGames', { games });
  }
  function upsertPlayers(players) {
    return postAction('upsertPlayers', { players });
  }
  function upsertSessions(sessions) {
    return postAction('upsertSessions', { sessions });
  }

  // 送信キューを順に処理。オフライン/失敗時はキューに残す。
  async function flushQueue() {
    if (!isConfigured()) return { ok: false, error: 'not_configured' };
    if (!navigator.onLine) return { ok: false, error: 'offline' };
    let q = storage.getSyncQueue();
    if (q.length === 0) return { ok: true, sent: 0 };
    let sent = 0;
    while (q.length > 0) {
      const item = q[0];
      let res;
      if (item.kind === 'games') res = await upsertGames(item.payload);
      else if (item.kind === 'players') res = await upsertPlayers(item.payload);
      else if (item.kind === 'sessions') res = await upsertSessions(item.payload);
      else res = { ok: true };
      if (!res || !res.ok) break; // stop, keep remaining in queue
      q.shift();
      sent++;
      storage.setSyncQueue(q);
    }
    const c = cfg();
    c.lastSyncAt = Date.now();
    storage.setSyncConfig(c);
    return { ok: true, sent, remaining: q.length };
  }

  function queueGameSave(gameOrGames) {
    const games = Array.isArray(gameOrGames) ? gameOrGames : [gameOrGames];
    if (games.length) storage.queuePush('games', games);
  }
  function queuePlayersSave(players) {
    storage.queuePush('players', players);
  }
  function queueSessionSave(sessionOrSessions) {
    const sessions = Array.isArray(sessionOrSessions) ? sessionOrSessions : [sessionOrSessions];
    if (sessions.length) storage.queuePush('sessions', sessions);
  }

  // 起動時/戦績タブ表示時の取得マージ(last-write-wins)
  async function pullAndMerge() {
    if (!isConfigured()) return { ok: false, error: 'not_configured' };
    const listRes = await list();
    if (!listRes.ok) return listRes;
    const local = storage.getGames();
    const localById = Object.fromEntries(local.map((g) => [g.id, g]));
    const needIds = listRes.games
      .filter((rg) => !localById[rg.id] || (localById[rg.id].updatedAt || 0) < rg.updatedAt)
      .map((rg) => rg.id);
    let mergedGames = 0;
    if (needIds.length > 0) {
      const got = await getGames(needIds);
      if (got.ok) {
        got.games.forEach((rg) => {
          const idx = local.findIndex((g) => g.id === rg.id);
          if (idx >= 0) local[idx] = rg;
          else local.push(rg);
        });
        storage.setGames(local.filter((g) => !g.deleted));
        mergedGames = got.games.length;
      }
    }
    // v1.4(15.2/15.4): list応答に含まれる全Playerをlast-write-winsでローカルにマージ。
    // これにより対局のplayerIdに対応するプレイヤーがローカルに無い場合も補完される。
    let mergedPlayers = 0;
    if (Array.isArray(listRes.players)) {
      const localPlayers = storage.getPlayers();
      const localPById = Object.fromEntries(localPlayers.map((p) => [p.id, p]));
      listRes.players.forEach((rp) => {
        const lp = localPById[rp.id];
        if (!lp) {
          localPlayers.push(rp);
          localPById[rp.id] = rp;
          mergedPlayers++;
        } else if ((lp.updatedAt || 0) < (rp.updatedAt || 0)) {
          Object.assign(lp, rp);
          mergedPlayers++;
        }
      });
      if (mergedPlayers > 0) storage.setPlayers(localPlayers);
    }
    // v2.1(F-35): listに含まれる全Session(last-write-wins)
    let mergedSessions = 0;
    if (Array.isArray(listRes.sessions)) {
      const localSessions = storage.getSessions();
      const localSById = Object.fromEntries(localSessions.map((s) => [s.id, s]));
      listRes.sessions.forEach((rs) => {
        const ls = localSById[rs.id];
        if (!ls) {
          localSessions.push(rs);
          localSById[rs.id] = rs;
          mergedSessions++;
        } else if ((ls.updatedAt || 0) < (rs.updatedAt || 0)) {
          Object.assign(ls, rs);
          mergedSessions++;
        }
      });
      if (mergedSessions > 0) storage.setSessions(localSessions);
    }
    return { ok: true, merged: mergedGames, mergedPlayers, mergedSessions };
  }

  return { cfg, isConfigured, ping, list, getGames, upsertGames, upsertPlayers, upsertSessions, flushQueue, queueGameSave, queuePlayersSave, queueSessionSave, pullAndMerge };
})();

// ==== stats ==== プレイヤー詳細統計(F-33・6.13.2 唯一の正)。派生データのみ、DOM非依存の純粋関数群。
const stats = (function () {
  'use strict';

  // events を保持し(空でなく)、容量圧縮で欠落していない対局のみ「局単位の指標」の分母に含める
  function hasEventLog(g) {
    return Array.isArray(g.events) && g.events.length > 0 && !g.eventsTruncated;
  }

  // 1対局・1プレイヤーぶんのイベント再生集計(和了率等の分子・分母の元データ)
  function computeEventStats(game, seatIdx) {
    let s = engine.initialState(game);
    let participatedKyoku = 0,
      wins = 0,
      deals = 0,
      riichis = 0,
      chombo = 0,
      tsumoWins = 0,
      sumWinPoints = 0,
      winCount = 0;
    (game.events || []).forEach((ev) => {
      const benchIdx = s.benchIdx;
      if (ev.type === 'RIICHI' && ev.seat === seatIdx) riichis++;
      if (ev.type === 'RIICHI_CANCEL' && ev.seat === seatIdx) riichis--;
      if (ev.type === 'WIN' || ev.type === 'DRAW') {
        const isBench = game.mode === 'yonin_sanma' && benchIdx === seatIdx;
        if (!isBench) participatedKyoku++;
      }
      if (ev.type === 'WIN') {
        ev.winners.forEach((w) => {
          if (w.seat !== seatIdx) return;
          wins++;
          if (ev.method === 'tsumo') tsumoWins++;
          let total;
          if (w.directPoints != null) total = w.directPoints;
          else {
            const role = w.seat === s.dealerIdx ? 'dealer' : 'child';
            total = domain.winPayments(w.han, w.fu, role, ev.method).total;
          }
          sumWinPoints += total;
          winCount++;
        });
        if (ev.method === 'ron' && ev.loserSeat === seatIdx) deals++;
      }
      if (ev.type === 'CHOMBO' && ev.seat === seatIdx) chombo++;
      s = engine.applyEvent(s, game, ev);
    });
    return { participatedKyoku, wins, deals, riichis: Math.max(0, riichis), chombo, tsumoWins, sumWinPoints, winCount };
  }

  // プレイスタイル指標(和了率・放銃率・リーチ率・ツモ率・平均打点・チョンボ回数)
  function styleMetrics(games, playerId) {
    const evGames = games.filter(hasEventLog);
    let totalKyoku = 0, wins = 0, deals = 0, riichis = 0, chombo = 0, tsumoWins = 0, sumWinPoints = 0, winCount = 0, usedGames = 0;
    evGames.forEach((g) => {
      const seat = g.seats.findIndex((s) => s.playerId === playerId);
      if (seat < 0) return;
      usedGames++;
      const r = computeEventStats(g, seat);
      totalKyoku += r.participatedKyoku;
      wins += r.wins;
      deals += r.deals;
      riichis += r.riichis;
      chombo += r.chombo;
      tsumoWins += r.tsumoWins;
      sumWinPoints += r.sumWinPoints;
      winCount += r.winCount;
    });
    return {
      evGameCount: usedGames,
      totalKyoku,
      winRate: totalKyoku ? wins / totalKyoku : null,
      dealRate: totalKyoku ? deals / totalKyoku : null,
      riichiRate: totalKyoku ? riichis / totalKyoku : null,
      tsumoRate: wins ? tsumoWins / wins : null,
      avgWinPoints: winCount ? Math.round(sumWinPoints / winCount) : null,
      chombo,
      wins,
      deals,
    };
  }

  // サマリ・順位分布・pt推移(result由来。eventsの有無に依存しない)
  function summary(games, playerId) {
    const participated = games.filter((g) => (g.result || []).some((r) => r.playerId === playerId));
    const sorted = [...participated].sort((a, b) => (a.endedAt || a.startedAt) - (b.endedAt || b.startedAt));
    let sumPt = 0, sumYen = 0, rankSum = 0, lastCount = 0, rentaiCount = 0, cum = 0;
    const rankCounts = {};
    const trend = [];
    let maxSeats = 0;
    sorted.forEach((g) => {
      const r = g.result.find((x) => x.playerId === playerId);
      sumPt += r.totalPt;
      sumYen += r.yen || 0;
      rankSum += r.rank;
      rankCounts[r.rank] = (rankCounts[r.rank] || 0) + 1;
      if (r.rank === g.seats.length) lastCount++;
      if (r.rank <= 2) rentaiCount++;
      cum += r.totalPt;
      maxSeats = Math.max(maxSeats, g.seats.length);
      trend.push({ at: g.endedAt || g.startedAt, cum, serialNo: g.serialNo });
    });
    const n = participated.length;
    return {
      count: n,
      sumPt,
      sumYen,
      avgRank: n ? rankSum / n : 0,
      rankCounts,
      maxSeats,
      lastAvoidRate: n ? 1 - lastCount / n : 0,
      rentaiRate: n ? rentaiCount / n : 0,
      trend: trend.slice(-50),
    };
  }

  // 直対収支(6.13.2)
  function rivalStats(games, playerId) {
    const participated = games.filter((g) => (g.result || []).some((r) => r.playerId === playerId));
    const map = {};
    participated.forEach((g) => {
      const me = g.result.find((r) => r.playerId === playerId);
      g.result.forEach((r) => {
        if (r.playerId === playerId) return;
        if (!map[r.playerId]) map[r.playerId] = { count: 0, ptSum: 0, win: 0, lose: 0 };
        const m = map[r.playerId];
        m.count++;
        m.ptSum += me.totalPt;
        if (me.rank < r.rank) m.win++;
        else if (me.rank > r.rank) m.lose++;
      });
    });
    return Object.entries(map)
      .map(([pid, v]) => Object.assign({ playerId: pid }, v))
      .sort((a, b) => b.ptSum - a.ptSum);
  }

  function filterGames(games, mode, period) {
    let list = games.filter((g) => g.status === 'finished' && !g.deleted);
    if (mode && mode !== 'all') list = list.filter((g) => g.mode === mode);
    if (period && period.from != null) list = list.filter((g) => (g.endedAt || g.startedAt) >= period.from);
    if (period && period.to != null) list = list.filter((g) => (g.endedAt || g.startedAt) <= period.to);
    return list;
  }

  return { hasEventLog, computeEventStats, styleMetrics, summary, rivalStats, filterGames };
})();

// ==== share ==== 結果共有画像(F-31)・QR/URLデータ共有(F-32)の非DOM純粋関数(6.11〜6.12)
const share = (function () {
  'use strict';

  function b64urlEncode(bytes) {
    let bin = '';
    bytes.forEach((b) => (bin += String.fromCharCode(b)));
    return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }
  function b64urlDecode(str) {
    str = str.replace(/-/g, '+').replace(/_/g, '/');
    while (str.length % 4) str += '=';
    const bin = atob(str);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  async function compress(str) {
    const input = new TextEncoder().encode(str);
    if (typeof CompressionStream === 'undefined') return { raw: true, bytes: input };
    const cs = new CompressionStream('deflate-raw');
    const writer = cs.writable.getWriter();
    writer.write(input);
    writer.close();
    const buf = await new Response(cs.readable).arrayBuffer();
    return { raw: false, bytes: new Uint8Array(buf) };
  }
  async function decompress(bytes, raw) {
    if (raw) return new TextDecoder().decode(bytes);
    if (typeof DecompressionStream === 'undefined') throw new Error('unsupported_decompress');
    const ds = new DecompressionStream('deflate-raw');
    const writer = ds.writable.getWriter();
    writer.write(bytes);
    writer.close();
    const buf = await new Response(ds.readable).arrayBuffer();
    return new TextDecoder().decode(buf);
  }

  // 6.12.3: SharePayload → #import= 用文字列(base64url。非対応環境は raw: プレフィックス)
  async function encodePayload(payload) {
    const json = JSON.stringify(payload);
    const comp = await compress(json);
    const b64 = b64urlEncode(comp.bytes);
    return (comp.raw ? 'raw:' : '') + b64;
  }
  async function decodePayload(encoded) {
    let raw = false, b64 = encoded;
    if (encoded.indexOf('raw:') === 0) {
      raw = true;
      b64 = encoded.slice(4);
    }
    const bytes = b64urlDecode(b64);
    const json = await decompress(bytes, raw);
    return JSON.parse(json);
  }

  return { compress, decompress, encodePayload, decodePayload, b64urlEncode, b64urlDecode };
})();

// ==== voice ==== 音声読み上げ(F-36。6.16。Web Speech API。非対応環境は無音でスキップ)
const voice = (function () {
  'use strict';
  const supported = typeof window !== 'undefined' && 'speechSynthesis' in window;
  let jaVoice = null;
  let voicesReady = false;
  function pickVoice() {
    if (!supported) return null;
    const list = window.speechSynthesis.getVoices();
    if (list && list.length) {
      voicesReady = true;
      jaVoice = list.find((v) => v.lang === 'ja-JP') || list.find((v) => (v.lang || '').indexOf('ja') === 0) || null;
    }
    return jaVoice;
  }
  if (supported) {
    pickVoice();
    if (typeof window.speechSynthesis.addEventListener === 'function') {
      window.speechSynthesis.addEventListener('voiceschanged', pickVoice);
    }
  }
  function speak(text) {
    if (!supported || !text) return;
    try {
      window.speechSynthesis.cancel(); // MUST: 直前の発話を打ち切る
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ja-JP';
      u.rate = 1.0;
      u.pitch = 1.0;
      if (!voicesReady) pickVoice();
      if (jaVoice) u.voice = jaVoice;
      window.speechSynthesis.speak(u);
    } catch (e) {
      /* noop: 非対応環境は無音でスキップ(エラー表示しない) */
    }
  }
  function cancel() {
    if (supported) {
      try {
        window.speechSynthesis.cancel();
      } catch (e) {
        /* noop */
      }
    }
  }
  // ---- 6.16: 読み上げ文言の組み立て(唯一の正) ----
  function scoreLabelFor(han, fu) {
    if (han >= 13) return (Math.floor(han / 13) > 1 ? Math.floor(han / 13) + '倍役満' : '役満');
    if (han >= 11) return '三倍満';
    if (han >= 8) return '倍満';
    if (han >= 6) return '跳満';
    if (han >= 5) return '満貫';
    return han + '翻' + fu + '符';
  }
  function speakWin(ev, payDetail, isDealer) {
    // payDetail: { total, dealerPays, childPays, childEach, allSame } (domain.winPaymentsの戻り値。directPointsの場合はnull)
    ev.winners.forEach((w) => {
      let scoreTxt;
      if (w.directPoints != null) {
        scoreTxt = w.directPoints + '点';
      } else {
        scoreTxt = scoreLabelFor(w.han, w.fu) + (w.han < 5 ? '' : '');
      }
      if (ev.method === 'ron') {
        const total = w.directPoints != null ? w.directPoints : payDetail && payDetail.total;
        speak('ロン、' + (w.directPoints != null ? '' : scoreTxt + '、') + (total != null ? total + '点' : ''));
      } else if (isDealer) {
        const each = w.directPoints != null ? w.directPoints : payDetail && (payDetail.detail ? payDetail.detail.childEach : payDetail.childEach);
        speak('ツモ、' + (w.directPoints != null ? '' : scoreTxt + '、') + (each != null ? each + '点オール' : ''));
      } else {
        const cp = payDetail && (payDetail.detail ? payDetail.detail.childPays : payDetail.childPays);
        const dp = payDetail && (payDetail.detail ? payDetail.detail.dealerPays : payDetail.dealerPays);
        speak('ツモ、' + (w.directPoints != null ? '' : scoreTxt + '、') + (cp != null ? cp + '点、' + dp + '点' : ''));
      }
    });
  }
  return { supported, speak, cancel, speakWin, scoreLabelFor };
})();

  // 会集計: 参加プレイヤーごとに 対局数/合計pt/収支円合計/会の最終収支円(場代込み)
  function computeSessionAggregate(session) {
    const games = storage.getGames().filter((g) => g.sessionId === session.id && g.status === 'finished' && !g.deleted);
    const agg = {}; // playerId -> {count, totalPt, totalYen}
    let individualVenueYen = 0;
    games.forEach((g) => {
      (g.result || []).forEach((r) => {
        if (!agg[r.playerId]) agg[r.playerId] = { playerId: r.playerId, count: 0, totalPt: 0, totalYen: 0 };
        agg[r.playerId].count++;
        agg[r.playerId].totalPt += r.totalPt;
        agg[r.playerId].totalYen += r.yen || 0;
      });
      if (g.venue) individualVenueYen += g.venue.totalYen || 0;
    });
    const sv = session.venue;
    if (sv && sv.settlements) {
      sv.settlements.forEach((s) => {
        if (agg[s.playerId]) agg[s.playerId].sessionBurdenYen = s.burdenYen;
      });
    }
    Object.values(agg).forEach((a) => {
      a.finalYen = a.totalYen - (a.sessionBurdenYen || 0);
    });
    return { games, byPlayer: Object.values(agg).sort((a, b) => b.totalPt - a.totalPt), individualVenueYen };
  }

  function screenSessionDetail(sessionId) {
    const session = storage.getSessions().find((s) => s.id === sessionId);
    if (!session) return topbar('会', '<span class="side"><button class="iconbtn" data-act="back">‹</button></span>') + '<div class="empty-state"><div class="big">🙈</div>会が見つかりません</div>';
    const agg = computeSessionAggregate(session);
    const rows = agg.byPlayer
      .map(
        (a) =>

      topbar(session.name, '<span class="side"><button class="iconbtn" data-act="back">‹</button></span>', '<span class="side"><button class="iconbtn" data-act="session-edit">✎</button></span>') +

      '<div style="padding:16px 14px;display:flex;gap:10px;">' +

  function saveSessionList(session) {

    if (idx >= 0) list[idx] = session;
    else list.push(session);
    storage.setSessions(list);
    sync.queueSessionSave(session);
    sync.flushQueue();
  }

  // ---- v2.1(6.15.4): 会単位の場代精算。F-34と同一計算式をplayerIdベースで適用 ----
  function openSessionVenueModal(sessionId) {
    const session = storage.getSessions().find((s) => s.id === sessionId);
    const agg = computeSessionAggregate(session);
    const ranked = [...agg.byPlayer].sort((a, b) => b.totalPt - a.totalPt);
    const playerIds = ranked.map((a) => a.playerId); // index=擬似seat番号として domain.venueSettlement を再利用
    const betYenBySeat = {};
    ranked.forEach((a, i) => (betYenBySeat[i] = a.totalYen));
    const n = playerIds.length;
    if (n === 0) {
      toast('会に対局がありません');
      return;
    }
    const v = session.venue;
    const state = {
      totalYen: v ? v.totalYen : 0,
      method: v ? v.method : 'equal',
      weights: v && v.weights ? v.weights.slice() : defaultVenueWeights(n),
      payerIdx: v && v.payerPlayerId ? playerIds.indexOf(v.payerPlayerId) : -1,
    };
    function computeHtml() {
      const weightsOk = state.method !== 'weighted' || state.weights.reduce((a, b) => a + (b || 0), 0) === 100;
      let settlements = [];
      if (weightsOk && state.totalYen >= 0) {
        settlements = domain.venueSettlement(state.totalYen, state.method, state.weights, playerIds.map((_, i) => i), betYenBySeat);
      }
      const rows = playerIds
        .map((pid, i) => {
          const s = settlements[i] || { betYen: betYenBySeat[i] || 0, burdenYen: 0, finalYen: betYenBySeat[i] || 0 };
          return (
            '<div class="venue-row"><div><div class="nm">' + (i + 1) + '位 ' + playerName(pid) + '</div>' +
            '<div class="sub">対局収支合計 ' + (s.betYen >= 0 ? '+' : '') + s.betYen.toLocaleString() + '円 ・ 会場代負担 -' + s.burdenYen.toLocaleString() + '円</div></div>' +
            '<div class="final ' + (s.finalYen >= 0 ? 'pos' : 'neg') + '">' + (s.finalYen >= 0 ? '+' : '') + s.finalYen.toLocaleString() + '円</div></div>'
          );
        })
        .join('');
      const sumFinal = settlements.reduce((a, s) => a + s.finalYen, 0);
      const checkHtml = !weightsOk
        ? '<div class="venue-check-row err">傾斜%の合計が100ではありません</div>'
        : '<div class="venue-check-row ok">収支合計 ' + (sumFinal >= 0 ? '+' : '') + sumFinal.toLocaleString() + '円 ✓</div>';
      let transferHtml = '';
      if (weightsOk && state.payerIdx >= 0) {
        const transfers = domain.venueTransfers(settlements, state.payerIdx);
        transferHtml = transfers.length
          ? '<div class="section-title">送金リスト</div><div class="card">' + transfers.map((t) => '<div class="venue-transfer"><span>' + playerName(playerIds[t.from]) + ' → ' + playerName(playerIds[t.to]) + '</span><span>' + t.amount.toLocaleString() + '円</span></div>').join('') + '</div>'
          : '';
      }
      return { rowsHtml: rows, checkHtml, transferHtml, weightsOk, settlements };
    }
    const overlay = openSheet(
      '<div class="sheet-header"><button data-close class="iconbtn">×</button><h2>会の場代精算</h2><span></span></div>' +
      (agg.individualVenueYen ? '<div class="hint" style="color:var(--red);text-align:center;">対局単位の場代 合計¥' + agg.individualVenueYen.toLocaleString() + ' は別途精算済みのため含まれません</div>' : '') +
      '<label class="flabel">場代総額(円)</label>' +
      '<div class="stepper-row"><button class="stepper-btn" data-step="-100">−</button><input class="txt" id="sv-total" type="number" step="100" value="' + state.totalYen + '"><button class="stepper-btn" data-step="100">+</button></div>' +
      '<label class="flabel">負担方式</label>' +
      '<div class="seg" style="margin:0 14px 6px;width:auto;" id="sv-method-seg">' +
      ['equal', 'weighted', 'topExempt'].map((m) => '<button class="' + (state.method === m ? 'active' : '') + '" data-method="' + m + '">' + (m === 'equal' ? '均等割り' : m === 'weighted' ? '傾斜' : 'トップ免除') + '</button>').join('') +
      '</div>' +
      '<div id="sv-weights-wrap"></div>' +
      '<label class="flabel">立替者</label>' +
      '<div style="padding:0 14px;"><select class="txt" id="sv-payer"><option value="-1">なし(各自払い)</option>' + playerIds.map((pid, i) => '<option value="' + i + '"' + (state.payerIdx === i ? ' selected' : '') + '>' + playerName(pid) + '</option>').join('') + '</select></div>' +
      '<div id="sv-check" style="margin-top:8px;"></div>' +
      '<div class="card" id="sv-rows" style="margin-top:6px;"></div>' +
      '<div id="sv-transfers"></div>' +
      '<div style="padding:16px 14px 10px;display:flex;gap:10px;">' +
      (session.venue ? '<button class="btn btn-danger-text" data-delete>削除</button>' : '') +
      '<button class="btn btn-primary btn-block" data-save>保存</button>' +
      '</div>',
      { full: true }
    );
    function weightsInputHtml() {
      if (state.method !== 'weighted') return '';
      return '<div class="venue-weights">' + playerIds.map((pid, i) => '<div class="wcell"><label>' + (i + 1) + '位%</label><input type="number" data-w="' + i + '" value="' + (state.weights[i] || 0) + '"></div>').join('') + '</div>';
    }
    function bindWeightInputs() {
      overlay.querySelectorAll('[data-w]').forEach((inp) =>
        inp.addEventListener('input', () => {
          state.weights[parseInt(inp.dataset.w, 10)] = parseFloat(inp.value) || 0;
          refresh();
        })
      );
    }
    function refresh() {
      const c = computeHtml();
      overlay.querySelector('#sv-rows').innerHTML = c.rowsHtml;
      overlay.querySelector('#sv-check').innerHTML = c.checkHtml;
      overlay.querySelector('#sv-transfers').innerHTML = c.transferHtml;
      overlay.querySelector('[data-save]').disabled = !c.weightsOk;
      overlay.querySelector('[data-save]').style.opacity = c.weightsOk ? '1' : '.4';
    }
    overlay.querySelector('#sv-weights-wrap').innerHTML = weightsInputHtml();
    bindWeightInputs();
    overlay.querySelector('[data-close]').onclick = () => closeOverlay(overlay);
    const totalInput = overlay.querySelector('#sv-total');
    totalInput.oninput = () => {
      state.totalYen = Math.max(0, parseInt(totalInput.value, 10) || 0);
      refresh();
    };
    overlay.querySelectorAll('[data-step]').forEach((b) =>
      b.addEventListener('click', () => {
        state.totalYen = Math.max(0, state.totalYen + parseInt(b.dataset.step, 10));
        totalInput.value = state.totalYen;
        refresh();
      })
    );
    overlay.querySelectorAll('[data-method]').forEach((b) =>
      b.addEventListener('click', () => {
        state.method = b.dataset.method;
        overlay.querySelectorAll('[data-method]').forEach((x) => x.classList.toggle('active', x === b));
        overlay.querySelector('#sv-weights-wrap').innerHTML = weightsInputHtml();
        bindWeightInputs();
        refresh();
      })
    );
    overlay.querySelector('#sv-payer').onchange = (e) => {
      state.payerIdx = parseInt(e.target.value, 10);
      refresh();
    };
    overlay.querySelector('[data-save]').onclick = () => {
      const c = computeHtml();
      if (!c.weightsOk) return;
      session.venue = {
        totalYen: state.totalYen,
        method: state.method,
        weights: state.method === 'weighted' ? state.weights.slice() : undefined,
        payerPlayerId: state.payerIdx >= 0 ? playerIds[state.payerIdx] : undefined,
        settlements: c.settlements.map((s, i) => ({ playerId: playerIds[i], betYen: s.betYen, burdenYen: s.burdenYen, finalYen: s.finalYen })),
        updatedAt: Date.now(),
      };
      session.updatedAt = Date.now();
      saveSessionList(session);
      closeOverlay(overlay);
      toast('会の場代精算を保存しました');
      render();
    };
    const deleteBtn = overlay.querySelector('[data-delete]');
    if (deleteBtn) {
      deleteBtn.onclick = () => {
        delete session.venue;
        session.updatedAt = Date.now();
        saveSessionList(session);
        closeOverlay(overlay);
        toast('会の場代精算を削除しました');
        render();
      };
    }
    refresh();
  }

          '<div class="pl-row" data-seat="' + i + '">' +

  function bindSetupScreen() {
    bindSessionBanner();
    $app.querySelectorAll('[data-act="set-mode"]').forEach((b) =>
      b.addEventListener('click', () => {
        S.setup.mode = b.dataset.mode;
        S.setup.seatPlayerIds = new Array(seatCountOf(b.dataset.mode)).fill(null);
        S.setup.emptySeatSide = 'top';
        render();
      })
    );
    $app.querySelectorAll('[data-act="pick-player"]').forEach((b) =>
      b.addEventListener('click', () => openRosterPicker((pid) => {
        S.setup.seatPlayerIds[+b.dataset.seat] = pid;
        render();
      }))
    );
    $app.querySelectorAll('[data-act="seat-up"]').forEach((b) =>
      b.addEventListener('click', () => {
        if (b.disabled) return;
        const i = +b.dataset.seat;
        if (i > 0) {
          const arr = S.setup.seatPlayerIds;
          [arr[i - 1], arr[i]] = [arr[i], arr[i - 1]];
          render();
        }
      })
    );
    $app.querySelectorAll('[data-act="seat-down"]').forEach((b) =>
      b.addEventListener('click', () => {
        if (b.disabled) return;
        const i = +b.dataset.seat;
        const arr = S.setup.seatPlayerIds;
        if (i < arr.length - 1) {
          [arr[i + 1], arr[i]] = [arr[i], arr[i + 1]];
          render();
        }
      })
    );
    const q = (sel) => $app.querySelector(sel);
    if (q('[data-act="reset-seats"]')) q('[data-act="reset-seats"]').onclick = () => {
      S.setup.seatPlayerIds = new Array(seatCountOf(S.setup.mode)).fill(null);
      render();
    };
    if (q('[data-act="rotate-seats"]')) q('[data-act="rotate-seats"]').onclick = () => {
      const arr = S.setup.seatPlayerIds;
      arr.unshift(arr.pop());
      render();
    };
    if (q('[data-act="shuffle-seats"]')) q('[data-act="shuffle-seats"]').onclick = () => {
      const arr = S.setup.seatPlayerIds;
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      render();
    };
    if (q('[data-act="open-roster"]')) q('[data-act="open-roster"]').onclick = () => openRosterManage();
    if (q('[data-act="cycle-empty-seat"]')) q('[data-act="cycle-empty-seat"]').onclick = () => {
      const cycle = ['top', 'left', 'right'];
      const idx = cycle.indexOf(S.setup.emptySeatSide || 'top');
      S.setup.emptySeatSide = cycle[(idx + 1) % cycle.length];
      render();
    };
    if (q('[data-act="resume-game"]')) q('[data-act="resume-game"]').onclick = () => {
      S.game = storage.getActiveGame();
      navigate('#/game');
    };
    if (q('[data-act="result-only"]')) q('[data-act="result-only"]').onclick = () => openResultOnlyFlow();
    if (q('[data-act="start-game"]')) q('[data-act="start-game"]').onclick = () => startGame();
  }

  function startGame() {
    const mode = S.setup.mode;
    const n = seatCountOf(mode);
    const rules = storage.getRules(mode === 'yonin_sanma' ? 'yonin_sanma' : mode);
    const seats = S.setup.seatPlayerIds.map((pid, i) => ({ playerId: pid, wind: ['E', 'S', 'W', 'N'][i], name: playerName(pid) }));
    const activeSession = storage.getActiveSession();
    const game = {
      id: engine.uid(),
      serialNo: storage.nextSerial(),
      mode,
      rules,
      seats,
      emptySeatSide: mode === 'sanma' ? S.setup.emptySeatSide || 'top' : undefined,
      sessionId: activeSession ? activeSession.id : undefined,
      startedAt: Date.now(),
      events: [],
      status: 'active',
      updatedAt: Date.now(),
    };
    storage.setActiveGame(game);
    S.game = game;
    navigate('#/game');
  }

  function anonymizePlayer(p, affectedGames, refresh) {
    const anonName = '削除済みプレイヤー';
    // 1) プレイヤー本体を改名(以後、playerNameOf_)を通す表示は全てこの名前になる
    p.name = anonName;
    p.deleted = true;
    p.updatedAt = Date.now();
    storage.setPlayers(S.players);
    // 2) 過去の対局に埋め込まれたseat.nameスナップショット(GAS/エクスポート用)も
    //    書き換えて再保存・再送信する。これにより_rawのJSONやスプレッドシートの
    //    表示名からも元の名前が消える(通常のリネーム+対局再保存と同じ安全な経路)。
    affectedGames.forEach((g) => {
      g.seats.forEach((s) => {
        if (s.playerId === p.id) s.name = anonName;
      });
      g.updatedAt = Date.now();
    });
    storage.setGames(storage.getGames().map((g) => {
      const match = affectedGames.find((a) => a.id === g.id);
      return match || g;
    }));
    sync.queuePlayersSave([p]);
    if (affectedGames.length) sync.queueGameSave(affectedGames);
    sync.flushQueue();
    S.players = storage.getPlayers();
    toast(affectedGames.length + '件の対局の表示名を匿名化しました');
    refresh();
  }
