  function exportGamesAsJson(games) {
    const data = { schemaVersion: 1, exportedAt: Date.now(), games, players: storage.getPlayers() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'mahjong_export_' + Date.now() + '.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    const logs = storage.getShareLogs();
    logs.push({ id: engine.uid(), direction: 'export', at: Date.now(), gameIds: games.map((g) => g.id) });
    storage.setShareLogs(logs);
    toast('エクスポートしました');
  }

  function importJsonFlow() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = () => {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          const existing = storage.getGames();
          const existingIds = new Set(existing.map((g) => g.id));
          let added = 0;
          (data.games || []).forEach((g) => {
            if (!existingIds.has(g.id)) {
              existing.push(g);
              added++;
            }
          });
          storage.setGames(existing);
          const existingPlayers = storage.getPlayers();
          const byName = new Set(existingPlayers.map((p) => p.name));
          (data.players || []).forEach((p) => {
            if (!byName.has(p.name)) existingPlayers.push(p);
          });
          storage.setPlayers(existingPlayers);
          S.players = existingPlayers;
          const logs = storage.getShareLogs();
          logs.push({ id: engine.uid(), direction: 'import', at: Date.now(), gameIds: (data.games || []).map((g) => g.id) });
          storage.setShareLogs(logs);
          toast(added + '件の対局をインポートしました');
          render();
        } catch (e) {
          toast('インポートに失敗しました: ファイル形式を確認してください');
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }

  function openMergeFlow() {
    const players = S.players.filter((p) => !p.archived && !p.deleted);
    const listHtml = players.map((p) => '<div class="list-row"><div class="label">' + p.name + '</div><input type="checkbox" data-mp="' + p.id + '"></div>').join('');
    const overlay = openSheet(
      '<div class="sheet-header"><span></span><h2>プレイヤーのマージ</h2><button data-close class="iconbtn">×</button></div>' +
      '<div class="hint">統合するプレイヤーを2名以上選択してください</div>' +
      '<div class="card" style="margin-top:6px;">' + listHtml + '</div>' +
      '<div style="padding:14px;"><button class="btn btn-primary btn-block" data-next>次へ(統合先を選択)</button></div>',
      { full: true }
    );
    overlay.querySelector('[data-close]').onclick = () => closeOverlay(overlay);
    overlay.querySelector('[data-next]').onclick = () => {
      const checked = Array.from(overlay.querySelectorAll('[data-mp]:checked')).map((c) => c.dataset.mp);
      if (checked.length < 2) {
        toast('2名以上選択してください');
        return;
      }
      closeOverlay(overlay);
      chooseMergeTarget(checked);
    };
  }

  function chooseMergeTarget(ids) {
    const opts = ids.map((id) => [id, playerName(id)]);
    selectDialog('統合先を選択', opts, ids[0], (targetId) => {
      const sourceIds = ids.filter((id) => id !== targetId);
      const targetName = playerName(targetId);
      const games = storage.getGames();
      const touchedGames = [];
      games.forEach((g) => {
        let touched = false;
        g.seats.forEach((s) => {
          if (sourceIds.includes(s.playerId)) {
            s.playerId = targetId;
            s.name = targetName;
            touched = true;
          }
        });
        if (g.result) {
          g.result.forEach((r) => {
            if (sourceIds.includes(r.playerId)) {
              r.playerId = targetId;
              touched = true;
            }
          });
        }
        if (touched) {
          g.updatedAt = Date.now();
          touchedGames.push(g);
        }
      });
      storage.setGames(games);
      const archivedPlayers = [];
      S.players.forEach((p) => {
        if (sourceIds.includes(p.id)) {
          p.archived = true;
          p.updatedAt = Date.now();
          archivedPlayers.push(p);
        }
      });
      storage.setPlayers(S.players);
      if (touchedGames.length) {
        sync.queueGameSave(touchedGames);
      }
      if (archivedPlayers.length) {
        sync.queuePlayersSave(archivedPlayers);
      }
      sync.flushQueue();
      toast(touchedGames.length + '件の対局を統合しました');
      render();
    });
  }

  // ---- v1.4(15.5): 設定共有リンク #setup=<Base64 JSON> の読み取り ----
  function consumeSetupLink() {
    const h = location.hash;
    if (!h.startsWith('#setup=')) return;
    try {
      const b64 = h.slice('#setup='.length);
      const json = decodeURIComponent(escape(atob(b64)));
      const parsed = JSON.parse(json);
      if (parsed.gasUrl) {
        const cfg = storage.getSyncConfig();
        storage.setSyncConfig({ url: parsed.gasUrl, token: parsed.token || '', lastSyncAt: cfg.lastSyncAt || null });
        toast('スプレッドシート連携の設定を取り込みました');
      }
    } catch (e) {
      console.error('setup link parse failed', e);
    }
    history.replaceState(null, '', location.pathname + location.search);
  }

  // ---- v1.4(15.5): localStorageに同期設定が無ければ APP_CONFIG を自動採用 ----
  function applyDefaultSyncConfig() {
    const cfg = storage.getSyncConfig();
    if (!cfg.url && typeof APP_CONFIG !== 'undefined' && APP_CONFIG.gasUrl) {
      storage.setSyncConfig({ url: APP_CONFIG.gasUrl, token: APP_CONFIG.token || '', lastSyncAt: cfg.lastSyncAt || null });
    }
  }

  function buildSetupLink() {
    const cfg = storage.getSyncConfig();
    const json = JSON.stringify({ gasUrl: cfg.url, token: cfg.token });
    const b64 = btoa(unescape(encodeURIComponent(json)));
    return location.origin + location.pathname + '#setup=' + b64;
  }

  // =================================================================
  // INIT
  // =================================================================
  function init() {
    consumeSetupLink();
    applyDefaultSyncConfig();
    render();
    if (sync.isConfigured()) {
      sync.pullAndMerge().then((res) => {
        if (res && res.ok && (res.merged || res.mergedPlayers)) {
          S.players = storage.getPlayers();
          if (currentRoute() === '#/' || currentRoute().startsWith('#/records')) render();
        }
      });
      sync.flushQueue();
    }
    window.addEventListener('online', () => sync.flushQueue());
  }

  return { init };
})();

// ==== selftest ==== index.html?selftest=1 で自己テスト実行 (8.6章)
const selftest = (function () {
  'use strict';
  function approxEq(a, b, eps) {
    return Math.abs(a - b) < (eps || 0.0001);
  }

  function run() {
    const results = [];
    function check(name, actual, expected) {
      const ok = approxEq(actual, expected);
      results.push({ name, actual, expected, ok });
    }

    // TC-1
    {
      const rules = { returnPoints: 30000, startPoints: 25000, uma: [10, 5, -5, -10], rounding: 'round', tieBreak: 'seatOrder' };
      const finalPoints = [
        { seat: 0, points: 51900 },
        { seat: 1, points: 29300 },
        { seat: 2, points: 20800 },
        { seat: 3, points: -2000 },
      ];
      const res = domain.settleGame(finalPoints, 4, rules);
      const bySeat = Object.fromEntries(res.map((r) => [r.seat, r]));
      check('TC-1 伊藤栄(1位) pt', bySeat[0].totalPt, 52.0);
      check('TC-1 いっせい(2位) pt', bySeat[1].totalPt, 4.0);
      check('TC-1 しんご(3位) pt', bySeat[2].totalPt, -14.0);
      check('TC-1 ゆうすけ(4位) pt', bySeat[3].totalPt, -42.0);
      check('TC-1 合計0', res.reduce((a, r) => a + r.totalPt, 0), 0);
    }

    // TC-2
    {
      const rules = { returnPoints: 30000, startPoints: 25000, uma: [10, 5, -5, -10], rounding: 'round', tieBreak: 'seatOrder' };
      const finalPoints = [0, 1, 2, 3].map((s) => ({ seat: s, points: 25000 }));
      const res = domain.settleGame(finalPoints, 4, rules);
      const bySeat = Object.fromEntries(res.map((r) => [r.seat, r]));
      check('TC-2 起家(1位) pt', bySeat[0].totalPt, 25.0);
      check('TC-2 2位 pt', bySeat[1].totalPt, 0.0);
      check('TC-2 3位 pt', bySeat[2].totalPt, -10.0);
      check('TC-2 4位 pt', bySeat[3].totalPt, -15.0);
      check('TC-2 合計0', res.reduce((a, r) => a + r.totalPt, 0), 0);
    }

    // TC-3
    {
      const oka = ((35000 - 30000) * 3) / 1000;
      check('TC-3 3麻オカ', oka, 15);
    }

    // TC-4
    {
      check('TC-4 子ロン30符4翻', domain.winPayments(4, 30, 'child', 'ron').total, 7700);
      check('TC-4 親ロン30符4翻', domain.winPayments(4, 30, 'dealer', 'ron').total, 11600);
      const t = domain.winPayments(3, 25, 'child', 'tsumo');
      check('TC-4 子ツモ25符3翻(親払)', t.detail.dealerPays, 1600);
      check('TC-4 子ツモ25符3翻(子払)', t.detail.childPays, 800);
      check('TC-4 子5翻(満貫)', domain.winPayments(5, 30, 'child', 'ron').total, 8000);
      check('TC-4 親5翻(満貫)', domain.winPayments(5, 30, 'dealer', 'ron').total, 12000);
      check('TC-4 子13翻(役満)', domain.winPayments(13, 30, 'child', 'ron').total, 32000);
      check('TC-4 親13翻(役満)', domain.winPayments(13, 30, 'dealer', 'ron').total, 48000);
    }

    // TC-5
    {
      const base = domain.winPayments(3, 30, 'child', 'ron').total;
      const honba = 300 * 2;
      const sticks = 1000 * 2;
      check('TC-5 放銃者支払(3900+600)', base + honba, 3900 + 600);
      check('TC-5 和了者受取(3900+600+2000)', base + honba + sticks, 3900 + 600 + 2000);
    }

    // TC-6
    {
      const result = domain.drawSettlement(3000, [0], [0, 1, 2, 3]);
      check('TC-6 テンパイ者+3000', result[0], 3000);
      check('TC-6 ノーテン1 -1000', result[1], -1000);
      check('TC-6 ノーテン2 -1000', result[2], -1000);
      check('TC-6 ノーテン3 -1000', result[3], -1000);
    }

    return results;
  }

  function render() {
    const results = run();
    const pass = results.filter((r) => r.ok).length;
    const fail = results.length - pass;
    const rows = results
      .map(
        (r) =>
          '<div style="display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #e4e4e8;font-size:13.5px;">' +
          '<span>' + (r.ok ? '✅' : '❌') + ' ' + r.name + '</span>' +
          '<span style="font-variant-numeric:tabular-nums;color:' + (r.ok ? '#3d9440' : '#d64545') + ';">actual=' + r.actual + ' / expected=' + r.expected + '</span>' +
          '</div>'
      )
      .join('');
    document.getElementById('app').innerHTML =
      '<div style="padding:16px;font-family:-apple-system,sans-serif;">' +
      '<h1 style="font-size:20px;">自己テスト結果 (8.6章 TC-1〜TC-6)</h1>' +
      '<div style="font-size:12px;color:#8a8a8e;margin-bottom:8px;">雀点 v' + APP_VERSION + ' ・ 仕様書 v' + SPEC_VERSION + '</div>' +
      '<div style="font-size:16px;font-weight:800;margin:10px 0;color:' + (fail === 0 ? '#3d9440' : '#d64545') + ';">' +
      (fail === 0 ? '✅ 全' + results.length + '件パス' : '❌ ' + fail + '件失敗 / 全' + results.length + '件') +
      '</div>' +
      '<div style="background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e4e4e8;">' + rows + '</div>' +
      '</div>';
  }

  return { run, render };
})();

// ==== bootstrap ====
(function () {
  'use strict';
  const params = new URLSearchParams(location.search);
  if (params.get('selftest') === '1') {
    document.getElementById('tabbar').classList.add('hidden');
    document.getElementById('app').classList.add('no-tabbar');
    selftest.render();
  } else {
    ui.init();
  }
})();
</script>
</body>
</html>
